<!DOCTYPE html>
<html lang="ru" id="htmlRoot">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Склад - Управление товарами</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="data:application/json,{%22name%22:%22%D0%A1%D0%BA%D0%BB%D0%B0%D0%B4%22,%22short_name%22:%22%D0%A1%D0%BA%D0%BB%D0%B0%D0%B4%22,%22start_url%22:%22/%22,%22display%22:%22standalone%22,%22background_color%22:%22%23ffffff%22,%22theme_color%22:%22%232481cc%22}">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Склад">
    <meta name="theme-color" content="#2481cc" id="themeColor">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        /* ===== ОСТАВЛЯЕМ ВСЕ ПРЕДЫДУЩИЕ СТИЛИ ===== */
        /* ... все стили из предыдущей версии ... */
        
        /* ===== НОВЫЕ СТИЛИ ДЛЯ ГРАФИКА ===== */
        .schedule-big-grid {
            display: grid;
            grid-template-columns: 200px 1fr 280px;
            gap: 16px;
            height: 500px;
            margin-top: 12px;
        }
        .schedule-big-grid .employees-list {
            overflow-y: auto;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 8px;
        }
        .schedule-big-grid .employees-list .emp-item {
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2px;
        }
        .schedule-big-grid .employees-list .emp-item:hover {
            background: var(--border-color);
        }
        .schedule-big-grid .employees-list .emp-item.active {
            background: rgba(74,108,247,0.15);
            border-left: 3px solid var(--accent-color);
        }
        .schedule-big-grid .employees-list .emp-item .emp-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 12px;
            flex-shrink: 0;
            color: white;
        }
        .schedule-big-grid .employees-list .emp-item .emp-name {
            font-size: 13px;
            font-weight: 500;
        }
        .schedule-big-grid .employees-list .emp-item .emp-balance {
            font-size: 11px;
            color: var(--text-muted);
            margin-left: auto;
        }
        .schedule-big-grid .calendar-wrapper {
            overflow-y: auto;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 8px;
        }
        .schedule-big-grid .calendar-wrapper .week-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            margin-bottom: 4px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-align: center;
        }
        .schedule-big-grid .calendar-wrapper .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }
        .schedule-big-grid .calendar-wrapper .days-grid .day-cell {
            padding: 4px 2px;
            text-align: center;
            border-radius: 6px;
            font-size: 12px;
            background: var(--border-color);
            cursor: pointer;
            transition: all 0.2s;
            min-height: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .schedule-big-grid .calendar-wrapper .days-grid .day-cell:hover {
            transform: scale(1.05);
        }
        .schedule-big-grid .calendar-wrapper .days-grid .day-cell.present {
            background: rgba(46,204,113,0.25);
            border: 1px solid var(--success-color);
        }
        .schedule-big-grid .calendar-wrapper .days-grid .day-cell.absent {
            background: rgba(231,76,60,0.15);
            border: 1px solid var(--danger-color);
        }
        .schedule-big-grid .calendar-wrapper .days-grid .day-cell.weekend {
            color: var(--danger-color);
            opacity: 0.6;
        }
        .schedule-big-grid .calendar-wrapper .days-grid .day-cell.today {
            border-color: var(--accent-color);
            border-width: 2px;
        }
        .schedule-big-grid .calendar-wrapper .days-grid .day-cell .day-num {
            font-weight: 600;
            font-size: 13px;
        }
        .schedule-big-grid .calendar-wrapper .days-grid .day-cell .day-status {
            font-size: 8px;
        }
        .schedule-big-grid .payroll-side {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 12px;
            overflow-y: auto;
        }
        .schedule-big-grid .payroll-side .payroll-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        .schedule-big-grid .payroll-side .payroll-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
        }
        .schedule-big-grid .payroll-side .payroll-item:last-child {
            border-bottom: none;
        }
        .schedule-big-grid .payroll-side .payroll-item .p-name { font-weight: 500; }
        .schedule-big-grid .payroll-side .payroll-item .p-amount {
            font-weight: 700;
            color: var(--success-color);
        }
        .schedule-big-grid .payroll-side .payroll-total {
            font-weight: 700;
            font-size: 16px;
            padding-top: 8px;
            border-top: 2px solid var(--border-color);
            margin-top: 8px;
            display: flex;
            justify-content: space-between;
        }
        
        .schedule-controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            align-items: center;
        }
        .schedule-controls select,
        .schedule-controls input {
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 13px;
        }
        
        .balance-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .balance-card .balance-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            color: white;
            flex-shrink: 0;
        }
        .balance-card .balance-info {
            flex: 1;
        }
        .balance-card .balance-info .balance-name {
            font-weight: 600;
            font-size: 14px;
        }
        .balance-card .balance-info .balance-email {
            font-size: 11px;
            color: var(--text-muted);
        }
        .balance-card .balance-amount {
            font-weight: 700;
            font-size: 18px;
            color: var(--success-color);
        }
        
        @media (max-width: 768px) {
            .schedule-big-grid {
                grid-template-columns: 1fr;
                grid-template-rows: 150px 300px 200px;
                height: auto;
            }
            .schedule-big-grid .payroll-side {
                max-height: 200px;
            }
        }
    </style>
</head>
<body>

    <!-- ... ВСЯ ОСТАЛЬНАЯ РАЗМЕТКА ОСТАЁТСЯ ТАКОЙ ЖЕ ... -->

    <!-- ============================================
    НОВАЯ МОДАЛКА ГРАФИКА И ЗАРПЛАТЫ
    ============================================ -->
    <div class="modal-overlay" id="bigScheduleModal">
        <div class="modal-content" style="max-width:1000px;">
            <div class="modal-header" style="border-bottom-color:var(--warning-color);">
                <div class="modal-title">
                    <span class="icon">📊</span>
                    <span id="bigScheduleTitle">График выхода и зарплата</span>
                    <span class="count" id="bigScheduleMonthDisplay"></span>
                </div>
                <button class="close-btn" onclick="closeBigScheduleModal()">✕</button>
            </div>
            
            <!-- Управление -->
            <div class="schedule-controls">
                <select id="bigScheduleEmployeeSelect" style="flex:2; min-width:150px;">
                    <option value="">Выберите сотрудника</option>
                </select>
                <input type="month" id="bigScheduleMonth" style="flex:1; min-width:120px;">
                <button class="small" onclick="loadBigSchedule()" style="background:var(--accent-color);">📅 Загрузить</button>
                <button class="success small" onclick="markAllPresentBig()">✅ Все пришли</button>
                <button class="danger small" onclick="markAllAbsentBig()">❌ Все отсутствуют</button>
                <button class="warning small" onclick="saveBigSchedule()">💾 Сохранить</button>
                <button class="success small" onclick="applyShiftPayment()" style="background:var(--success-color);">💰 Начислить за смену</button>
            </div>
            
            <!-- Основная сетка -->
            <div class="schedule-big-grid">
                <!-- Список сотрудников -->
                <div class="employees-list" id="bigEmployeesList">
                    <div style="text-align:center; padding:20px; color:var(--text-muted); font-size:13px;">
                        Загрузите сотрудников
                    </div>
                </div>
                
                <!-- Календарь -->
                <div class="calendar-wrapper" id="bigCalendarWrapper">
                    <div class="week-days" id="bigWeekDays">
                        <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span>
                    </div>
                    <div class="days-grid" id="bigDaysGrid">
                        <div style="grid-column:1/-1; text-align:center; padding:20px; color:var(--text-muted);">
                            Выберите сотрудника и месяц
                        </div>
                    </div>
                </div>
                
                <!-- Расчёт зарплаты -->
                <div class="payroll-side" id="bigPayrollSide">
                    <div class="payroll-title">💰 Расчёт зарплаты</div>
                    <div id="bigPayrollContent">
                        <div style="color:var(--text-muted); font-size:13px; text-align:center; padding:10px;">
                            Выберите сотрудника для расчёта
                        </div>
                    </div>
                    
                    <!-- Балансы пользователей -->
                    <div style="margin-top:12px; border-top:1px solid var(--border-color); padding-top:8px;">
                        <div class="payroll-title" style="font-size:13px;">💳 Балансы сотрудников</div>
                        <div id="bigBalancesList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================
    JAVASCRIPT (ТОЛЬКО НОВЫЕ ФУНКЦИИ)
    ============================================ -->
    <script>
        // ==================================================
        // 📊 НОВАЯ СИСТЕМА ГРАФИКА И ЗАРПЛАТЫ
        // ==================================================
        
        let bigScheduleData = {};
        let bigScheduleUsers = [];
        let bigSelectedUserId = null;
        let userColors = {};

        // ===== ГЕНЕРАЦИЯ ЦВЕТОВ =====
        const colors = [
            '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7',
            '#DDA0DD', '#FF8A5C', '#A29BFE', '#FD79A8', '#00B894',
            '#E17055', '#74B9FF', '#55EFC4', '#FDCB6E', '#6C5CE7',
            '#FF7675', '#00CEC9', '#E056A0', '#F0932B', '#6AB04C'
        ];

        function getUserColor(userId) {
            if (!userColors[userId]) {
                const index = Object.keys(userColors).length % colors.length;
                userColors[userId] = colors[index];
            }
            return userColors[userId];
        }

        // ===== ОТКРЫТИЕ МОДАЛКИ =====
        async function openBigScheduleModal() {
            // Проверяем права: IT может всё, остальные только если есть права
            if (currentUserRole !== 'it' && currentUserRole !== 'admin' &&
                !hasPermission('canViewSchedule') && !hasPermission('canManageSchedule') && 
                !hasPermission('canViewPayroll') && !hasPermission('canManagePayroll')) {
                showNotification('⛔ Недостаточно прав', 'error');
                return;
            }
            
            document.getElementById('bigScheduleModal').classList.add('show');
            document.body.style.overflow = 'hidden';
            
            const now = new Date();
            const monthStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
            document.getElementById('bigScheduleMonth').value = monthStr;
            
            await loadBigUsers();
            updateBigUserSelects();
            renderBigUsersList();
            renderBalancesList();
        }

        function closeBigScheduleModal() {
            document.getElementById('bigScheduleModal').classList.remove('show');
            document.body.style.overflow = 'auto';
        }

        // ===== ЗАГРУЗКА ПОЛЬЗОВАТЕЛЕЙ (СОТРУДНИКОВ) =====
        async function loadBigUsers() {
            try {
                // Загружаем всех пользователей, которые активны
                const snapshot = await db.collection('users')
                    .where('status', '==', 'active')
                    .get();
                
                bigScheduleUsers = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    // Проверяем, что пользователь имеет роль, которая может работать (не только IT)
                    // Исключаем IT и Admin из списка сотрудников (они управляют)
                    if (data.role !== 'it' && data.role !== 'admin') {
                        bigScheduleUsers.push({
                            id: doc.id,
                            email: data.email,
                            name: data.name || data.email,
                            role: data.role || 'viewer',
                            balance: data.balance || 0,
                            shiftRate: data.shiftRate || 1000 // ставка за смену по умолчанию
                        });
                    }
                });
                
                updateBigUserSelects();
                renderBigUsersList();
                renderBalancesList();
            } catch (e) {
                console.error('Ошибка загрузки пользователей:', e);
            }
        }

        // ===== ОБНОВЛЕНИЕ ВЫПАДАЮЩЕГО СПИСКА =====
        function updateBigUserSelects() {
            const select = document.getElementById('bigScheduleEmployeeSelect');
            if (!select) return;
            const currentValue = select.value;
            select.innerHTML = `<option value="">Выберите сотрудника</option>`;
            bigScheduleUsers.forEach(user => {
                select.innerHTML += `<option value="${user.id}" ${user.id === currentValue ? 'selected' : ''}>${escapeHtml(user.name)}</option>`;
            });
            if (currentValue && bigScheduleUsers.find(u => u.id === currentValue)) {
                select.value = currentValue;
            }
        }

        // ===== ОТОБРАЖЕНИЕ СПИСКА СОТРУДНИКОВ =====
        function renderBigUsersList() {
            const container = document.getElementById('bigEmployeesList');
            if (bigScheduleUsers.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:20px; color:var(--text-muted); font-size:13px;">Нет сотрудников</div>`;
                return;
            }
            let html = '';
            bigScheduleUsers.forEach(user => {
                const color = getUserColor(user.id);
                const active = bigSelectedUserId === user.id ? 'active' : '';
                const balance = user.balance || 0;
                html += `
                    <div class="emp-item ${active}" onclick="selectBigUser('${user.id}')">
                        <div class="emp-avatar" style="background:${color};">${(user.name || 'U')[0].toUpperCase()}</div>
                        <div class="emp-name">${escapeHtml(user.name)}</div>
                        <div class="emp-balance">💳 ${balance.toLocaleString()} ₽</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // ===== ВЫБОР СОТРУДНИКА =====
        function selectBigUser(userId) {
            bigSelectedUserId = userId;
            renderBigUsersList();
            document.getElementById('bigScheduleEmployeeSelect').value = userId;
            loadBigSchedule();
            renderBalancesList();
        }

        // ===== ЗАГРУЗКА ГРАФИКА =====
        async function loadBigSchedule() {
            const userId = document.getElementById('bigScheduleEmployeeSelect').value;
            const month = document.getElementById('bigScheduleMonth').value;
            
            if (!userId) {
                showNotification('Выберите сотрудника', 'error');
                return;
            }
            if (!month) {
                showNotification('Выберите месяц', 'error');
                return;
            }
            
            bigSelectedUserId = userId;
            renderBigUsersList();
            
            try {
                const docRef = await db.collection('schedule')
                    .where('userId', '==', userId)
                    .where('month', '==', month)
                    .get();
                
                bigScheduleData = {};
                docRef.forEach(doc => {
                    bigScheduleData = { id: doc.id, ...doc.data() };
                });
                
                renderBigSchedule(userId, month);
                calculateBigPayroll(userId, month);
                renderBalancesList();
            } catch (e) {
                console.error('Ошибка загрузки графика:', e);
            }
        }

        // ===== ОТОБРАЖЕНИЕ КАЛЕНДАРЯ =====
        function renderBigSchedule(userId, month) {
            const grid = document.getElementById('bigDaysGrid');
            const [year, monthNum] = month.split('-').map(Number);
            const daysInMonth = new Date(year, monthNum, 0).getDate();
            const firstDay = new Date(year, monthNum - 1, 1).getDay();
            const today = new Date();
            const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
            
            // Обновляем недели
            const weekDays = document.getElementById('bigWeekDays');
            const days = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
            weekDays.innerHTML = days.map(d => `<span>${d}</span>`).join('');
            
            let html = '';
            const startOffset = firstDay === 0 ? 6 : firstDay - 1;
            for (let i = 0; i < startOffset; i++) {
                html += `<div class="day-cell empty"></div>`;
            }
            
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(monthNum).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isToday = dateStr === todayStr;
                const isWeekend = new Date(year, monthNum - 1, d).getDay() === 0 || new Date(year, monthNum - 1, d).getDay() === 6;
                const status = bigScheduleData.days && bigScheduleData.days[d] ? bigScheduleData.days[d] : 'none';
                
                let statusClass = '';
                let statusText = '';
                if (status === 'present') {
                    statusClass = 'present';
                    statusText = '✅';
                } else if (status === 'absent') {
                    statusClass = 'absent';
                    statusText = '❌';
                }
                
                html += `
                    <div class="day-cell ${isWeekend ? 'weekend' : ''} ${isToday ? 'today' : ''} ${statusClass}" 
                         onclick="${canEditSchedule() ? `toggleBigDayStatus(${d})` : ''}">
                        <span class="day-num">${d}</span>
                        <span class="day-status">${statusText}</span>
                    </div>
                `;
            }
            
            grid.innerHTML = html;
        }

        // ===== ПРОВЕРКА ПРАВ НА РЕДАКТИРОВАНИЕ =====
        function canEditSchedule() {
            return currentUserRole === 'it' || currentUserRole === 'admin' || hasPermission('canManageSchedule');
        }

        // ===== ПЕРЕКЛЮЧЕНИЕ СТАТУСА ДНЯ =====
        async function toggleBigDayStatus(day) {
            if (!canEditSchedule()) {
                showNotification('⛔ Недостаточно прав для изменения графика', 'error');
                return;
            }
            
            const userId = document.getElementById('bigScheduleEmployeeSelect').value;
            const month = document.getElementById('bigScheduleMonth').value;
            if (!userId || !month) return;
            
            const currentStatus = bigScheduleData.days && bigScheduleData.days[day] ? bigScheduleData.days[day] : 'none';
            let newStatus;
            if (currentStatus === 'none' || currentStatus === 'absent') {
                newStatus = 'present';
            } else if (currentStatus === 'present') {
                newStatus = 'absent';
            } else {
                newStatus = 'none';
            }
            
            if (!bigScheduleData.days) bigScheduleData.days = {};
            bigScheduleData.days[day] = newStatus;
            
            try {
                if (bigScheduleData.id) {
                    await db.collection('schedule').doc(bigScheduleData.id).update({
                        days: bigScheduleData.days
                    });
                } else {
                    const docRef = await db.collection('schedule').add({
                        userId: userId,
                        month: month,
                        days: bigScheduleData.days,
                        createdAt: new Date().toISOString()
                    });
                    bigScheduleData.id = docRef.id;
                }
                renderBigSchedule(userId, month);
                calculateBigPayroll(userId, month);
                renderBalancesList();
            } catch (e) {
                console.error('Ошибка сохранения:', e);
                showNotification('❌ Ошибка сохранения', 'error');
            }
        }

        // ===== МАССОВЫЕ ДЕЙСТВИЯ =====
        function markAllPresentBig() {
            if (!canEditSchedule()) {
                showNotification('⛔ Недостаточно прав', 'error');
                return;
            }
            const userId = document.getElementById('bigScheduleEmployeeSelect').value;
            const month = document.getElementById('bigScheduleMonth').value;
            if (!userId || !month) return;
            
            const [year, monthNum] = month.split('-').map(Number);
            const daysInMonth = new Date(year, monthNum, 0).getDate();
            if (!bigScheduleData.days) bigScheduleData.days = {};
            for (let d = 1; d <= daysInMonth; d++) {
                bigScheduleData.days[d] = 'present';
            }
            saveBigSchedule();
        }

        function markAllAbsentBig() {
            if (!canEditSchedule()) {
                showNotification('⛔ Недостаточно прав', 'error');
                return;
            }
            const userId = document.getElementById('bigScheduleEmployeeSelect').value;
            const month = document.getElementById('bigScheduleMonth').value;
            if (!userId || !month) return;
            
            const [year, monthNum] = month.split('-').map(Number);
            const daysInMonth = new Date(year, monthNum, 0).getDate();
            if (!bigScheduleData.days) bigScheduleData.days = {};
            for (let d = 1; d <= daysInMonth; d++) {
                bigScheduleData.days[d] = 'absent';
            }
            saveBigSchedule();
        }

        async function saveBigSchedule() {
            if (!canEditSchedule()) {
                showNotification('⛔ Недостаточно прав', 'error');
                return;
            }
            const userId = document.getElementById('bigScheduleEmployeeSelect').value;
            const month = document.getElementById('bigScheduleMonth').value;
            if (!userId || !month) return;
            
            try {
                if (bigScheduleData.id) {
                    await db.collection('schedule').doc(bigScheduleData.id).update({
                        days: bigScheduleData.days || {}
                    });
                } else {
                    const docRef = await db.collection('schedule').add({
                        userId: userId,
                        month: month,
                        days: bigScheduleData.days || {},
                        createdAt: new Date().toISOString()
                    });
                    bigScheduleData.id = docRef.id;
                }
                showNotification('✅ График сохранён', 'success');
                renderBigSchedule(userId, month);
                calculateBigPayroll(userId, month);
                renderBalancesList();
            } catch (e) {
                showNotification('❌ Ошибка сохранения: ' + e.message, 'error');
            }
        }

        // ==================================================
        // 💰 НАЧИСЛЕНИЕ ЗА СМЕНУ
        // ==================================================
        async function applyShiftPayment() {
            if (!canEditSchedule()) {
                showNotification('⛔ Недостаточно прав для начисления', 'error');
                return;
            }
            
            const userId = document.getElementById('bigScheduleEmployeeSelect').value;
            const month = document.getElementById('bigScheduleMonth').value;
            if (!userId || !month) {
                showNotification('Выберите сотрудника и месяц', 'error');
                return;
            }
            
            const user = bigScheduleUsers.find(u => u.id === userId);
            if (!user) {
                showNotification('Сотрудник не найден', 'error');
                return;
            }
            
            // Считаем отработанные дни в этом месяце
            const [year, monthNum] = month.split('-').map(Number);
            const daysInMonth = new Date(year, monthNum, 0).getDate();
            let presentDays = 0;
            for (let d = 1; d <= daysInMonth; d++) {
                const status = bigScheduleData.days && bigScheduleData.days[d] ? bigScheduleData.days[d] : 'none';
                if (status === 'present') presentDays++;
            }
            
            if (presentDays === 0) {
                showNotification('Нет отработанных смен для начисления', 'warning');
                return;
            }
            
            const shiftRate = user.shiftRate || 1000;
            const totalPayment = presentDays * shiftRate;
            
            if (!confirm(`Начислить ${totalPayment.toLocaleString()} ₽ за ${presentDays} смен сотруднику ${user.name}?`)) {
                return;
            }
            
            try {
                // Обновляем баланс пользователя
                const newBalance = (user.balance || 0) + totalPayment;
                await db.collection('users').doc(userId).update({
                    balance: newBalance,
                    lastPayment: totalPayment,
                    lastPaymentDate: new Date().toISOString()
                });
                
                // Логируем начисление
                await db.collection('payments').add({
                    userId: userId,
                    amount: totalPayment,
                    days: presentDays,
                    month: month,
                    rate: shiftRate,
                    timestamp: new Date().toISOString(),
                    paidBy: currentUser.uid
                });
                
                showNotification(`✅ Начислено ${totalPayment.toLocaleString()} ₽ (${presentDays} смен × ${shiftRate} ₽)`, 'success');
                sendTelegramNotification(`💰 Начисление зарплаты\n👤 ${user.name}\n📅 ${month}\n📊 ${presentDays} смен\n💳 ${totalPayment.toLocaleString()} ₽`);
                
                // Обновляем данные
                user.balance = newBalance;
                await loadBigUsers();
                renderBigUsersList();
                renderBalancesList();
                calculateBigPayroll(userId, month);
                
            } catch (e) {
                console.error('Ошибка начисления:', e);
                showNotification('❌ Ошибка начисления: ' + e.message, 'error');
            }
        }

        // ==================================================
        // 💳 РАСЧЁТ ЗАРПЛАТЫ И БАЛАНСЫ
        // ==================================================
        function calculateBigPayroll(userId, month) {
            const container = document.getElementById('bigPayrollContent');
            const user = bigScheduleUsers.find(u => u.id === userId);
            if (!user) {
                container.innerHTML = `<div style="color:var(--text-muted); font-size:13px; text-align:center; padding:10px;">Выберите сотрудника для расчёта</div>`;
                return;
            }
            
            const [year, monthNum] = month.split('-').map(Number);
            const daysInMonth = new Date(year, monthNum, 0).getDate();
            let presentDays = 0;
            let absentDays = 0;
            
            for (let d = 1; d <= daysInMonth; d++) {
                const status = bigScheduleData.days && bigScheduleData.days[d] ? bigScheduleData.days[d] : 'none';
                if (status === 'present') presentDays++;
                else if (status === 'absent') absentDays++;
            }
            
            const shiftRate = user.shiftRate || 1000;
            const earned = presentDays * shiftRate;
            
            let html = `
                <div class="payroll-item">
                    <span class="p-name">👤 ${escapeHtml(user.name)}</span>
                    <span class="p-amount">${user.balance?.toLocaleString() || 0} ₽</span>
                </div>
                <div class="payroll-item">
                    <span class="p-name">📅 Отработано</span>
                    <span>${presentDays} дн.</span>
                </div>
                <div class="payroll-item">
                    <span class="p-name">📅 Отсутствовал</span>
                    <span>${absentDays} дн.</span>
                </div>
                <div class="payroll-item" style="border-bottom: 2px solid var(--border-color);">
                    <span class="p-name">💰 Ставка за смену</span>
                    <span>${shiftRate.toLocaleString()} ₽</span>
                </div>
                <div class="payroll-total">
                    <span>💰 Заработано за месяц</span>
                    <span style="color:var(--success-color); font-size:20px;">${earned.toLocaleString()} ₽</span>
                </div>
                <div class="payroll-total" style="border-top-color: var(--accent-color);">
                    <span>💳 Общий баланс</span>
                    <span style="color:var(--accent-color); font-size:20px;">${(user.balance || 0).toLocaleString()} ₽</span>
                </div>
            `;
            
            container.innerHTML = html;
        }

        // ===== ОТОБРАЖЕНИЕ БАЛАНСОВ ВСЕХ СОТРУДНИКОВ =====
        function renderBalancesList() {
            const container = document.getElementById('bigBalancesList');
            if (bigScheduleUsers.length === 0) {
                container.innerHTML = '<div style="color:var(--text-muted); font-size:12px; text-align:center; padding:8px;">Нет сотрудников</div>';
                return;
            }
            
            let html = '';
            // Сортируем по балансу (от большего к меньшему)
            const sorted = [...bigScheduleUsers].sort((a, b) => (b.balance || 0) - (a.balance || 0));
            
            // Показываем только если у пользователя есть права или это IT
            const showAll = currentUserRole === 'it' || currentUserRole === 'admin';
            
            sorted.forEach(user => {
                const color = getUserColor(user.id);
                // Если не IT и не Admin, показываем только свой баланс
                if (!showAll && user.id !== currentUser?.uid) return;
                
                const isSelf = user.id === currentUser?.uid;
                html += `
                    <div class="balance-card">
                        <div class="balance-avatar" style="background:${color};">${(user.name || 'U')[0].toUpperCase()}</div>
                        <div class="balance-info">
                            <div class="balance-name">${escapeHtml(user.name)} ${isSelf ? '⭐' : ''}</div>
                            <div class="balance-email">${escapeHtml(user.email)}</div>
                        </div>
                        <div class="balance-amount">${(user.balance || 0).toLocaleString()} ₽</div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // ==================================================
        // 🚀 ЗАПУСК
        // ==================================================
        // Остальной код остаётся без изменений
    </script>

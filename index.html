<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Общий склад - Редактирование товаров</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            color: #000000;
            padding: 16px;
            padding-bottom: 100px;
        }

        @media (prefers-color-scheme: dark) {
            body { background: #1a1a1a; color: #ffffff; }
            .card, .modal-content, .product-item { background: #2d2d2d !important; }
            input, select, textarea { background: #1a1a1a; color: #ffffff; border-color: #444; }
            .total-info { background: #2d2d2d; border-top-color: #444; }
            .product-item { border-bottom-color: #444 !important; }
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 24px; font-weight: 700; }

        button {
            background: #2481cc;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:active { opacity: 0.7; }
        button.success { background: #00b894; }
        button.danger { background: #ff5c5c; }
        button.warning { background: #fdcb6e; color: #333; }
        button.small { padding: 6px 14px; font-size: 13px; width: auto; }

        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #666; }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 15px;
        }
        textarea { resize: vertical; min-height: 60px; font-family: inherit; }

        /* ===== МОДАЛЬНОЕ ОКНО РЕДАКТИРОВАНИЯ ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }
        .modal-overlay.show { display: flex; }
        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 24px;
            animation: slideIn 0.25s ease;
        }
        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #2481cc;
        }
        .modal-header .modal-title { font-size: 20px; font-weight: 700; }
        .modal-header .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            width: auto;
            padding: 0 8px;
        }
        .modal-header .close-btn:hover { color: #ff5c5c; }

        .edit-photo-preview {
            text-align: center;
            margin: 8px 0;
        }
        .edit-photo-preview img {
            max-width: 120px;
            max-height: 120px;
            border-radius: 12px;
            border: 1px solid #ddd;
        }
        .edit-photo-preview .no-photo {
            color: #999;
            font-size: 14px;
        }

        /* ===== ТОВАРЫ ===== */
        .product-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.2s;
            border-radius: 8px;
            padding: 10px 12px;
        }
        .product-item:hover { background: rgba(36, 129, 204, 0.05); }
        .product-item:active { background: rgba(36, 129, 204, 0.1); }
        .product-item .p-photo {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            object-fit: cover;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }
        .product-item .p-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }
        .product-item .p-info { flex: 1; }
        .product-item .p-name { font-weight: 600; font-size: 14px; }
        .product-item .p-details { font-size: 12px; color: #999; }
        .product-item .p-qty {
            font-weight: 700;
            font-size: 16px;
            color: #000000;
            min-width: 36px;
            text-align: center;
        }
        .product-item .p-qty.low { color: #ff5c5c; }
        .product-item .p-edit-icon {
            font-size: 18px;
            color: #999;
            opacity: 0.4;
            transition: opacity 0.2s;
        }
        .product-item:hover .p-edit-icon { opacity: 1; }

        .empty-state { text-align: center; padding: 30px 0; color: #999; }
        .empty-state .icon { font-size: 48px; margin-bottom: 8px; }

        .total-info {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #808080;
            padding: 10px 16px;
            text-align: center;
            font-weight: 500;
            z-index: 100;
            font-size: 13px;
            color: #ffffff;
        }
        .sync-status {
            font-size: 12px;
            text-align: center;
            padding: 4px 16px;
            border-radius: 20px;
            display: inline-block;
        }
        .sync-online { background: rgba(0, 184, 148, 0.15); color: #00b894; }
        .sync-offline { background: rgba(255, 92, 92, 0.15); color: #ff5c5c; }
        .sync-waiting { background: rgba(36, 129, 204, 0.15); color: #2481cc; }
        .notification {
            position: fixed;
            bottom: 80px;
            left: 16px; right: 16px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            z-index: 200;
            animation: slideIn 0.2s;
        }
        .notification.success { background: #00b894; color: white; }
        .notification.error { background: #ff5c5c; color: white; }
        .notification.info { background: #2481cc; color: white; }

        .photo-preview { margin-top: 8px; text-align: center; }
        .photo-preview img { max-width: 120px; max-height: 120px; border-radius: 12px; }

        .edit-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 16px;
        }
        .edit-actions button { flex: 1; min-width: 100px; }

        .sku-size-badge {
            display: inline-block;
            font-size: 11px;
            color: #666;
            background: rgba(0,0,0,0.05);
            padding: 1px 8px;
            border-radius: 10px;
            margin-right: 4px;
        }

        @media (prefers-color-scheme: dark) {
            .sku-size-badge { color: #aaa; background: rgba(255,255,255,0.05); }
        }

        @media (max-width: 480px) {
            .modal-content { padding: 16px; }
            .product-item { flex-wrap: wrap; }
            .edit-actions { flex-direction: column; }
            .edit-actions button { min-width: auto; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📦 Управление складом</h1>
        <button class="small" onclick="location.reload()">🔄 Обновить</button>
    </div>
    <div style="text-align:center; margin-bottom:12px;">
        <span class="sync-status sync-waiting" id="syncStatus">🔄 Подключение...</span>
    </div>

    <!-- ===== КАТЕГОРИИ ===== -->
    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:12px;">
            <h3 style="font-size:18px;">📂 Категории</h3>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <input type="text" id="newCategoryName" placeholder="Название категории" style="width:160px; padding:8px 12px;">
                <input type="text" id="newCategoryEmoji" placeholder="Emoji" style="width:60px; padding:8px 12px; text-align:center;" value="📁">
                <button class="success small" onclick="addCategory()">➕ Создать</button>
            </div>
        </div>
        <div class="category-grid" id="categoryGrid">
            <div class="empty-state"><div class="icon">📭</div><p>Нет категорий</p></div>

    <!-- ===== ПОДКАТЕГОРИИ ===== -->
    <div class="card" id="subcategorySection" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:12px;">
            <h3 style="font-size:18px;" id="subcategoryTitle">📂 <span id="selectedCategoryName">Выберите категорию</span></h3>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <input type="file" id="subPhotoInput" accept="image/*" style="display:none;" onchange="previewSubPhoto(this)">
                <button class="small" onclick="document.getElementById('subPhotoInput').click()">📷 Фото</button>
                <input type="text" id="newSubcategoryName" placeholder="Название подкатегории" style="width:150px; padding:8px 12px;">
                <button class="success small" onclick="addSubcategory()">➕ Добавить</button>
                <button class="small" onclick="closeSubcategorySection()" style="background:#999;">✕ Закрыть</button>
            </div>
        </div>
        <div id="subPhotoPreview" class="photo-preview"></div>
        <div class="subcategory-grid" id="subcategoryGrid"></div>
    </div>

    <!-- ===== МОДАЛЬНОЕ ОКНО ПОДКАТЕГОРИИ (ТОВАРЫ) ===== -->
    <div class="modal-overlay" id="subModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">
                    <span class="icon" id="subModalIcon">📂</span>
                    <span id="subModalTitle">Подкатегория</span>
                    <span class="count" id="subModalCount"></span>
                </div>
                <button class="close-btn" onclick="closeSubModal()">✕</button>
            </div>
            <div id="subModalProducts"></div>
            <div class="add-product-row">
                <input type="text" id="subModalProductName" placeholder="Название товара">
                <input type="text" id="subModalProductSku" placeholder="Артикул" style="flex:0.7;">
                <input type="text" id="subModalProductSize" placeholder="Размер (S,M,L)" style="flex:0.5;">
                <input type="number" id="subModalProductQty" placeholder="Кол-во" value="1" style="flex:0.4; min-width:60px;">
                <input type="number" id="subModalProductMinStock" placeholder="Мин. остаток" value="5" style="flex:0.4; min-width:60px;">
                <input type="file" id="subModalProductPhoto" accept="image/*" style="display:none;" onchange="previewProductPhoto(this)">
                <button class="photo-btn" onclick="document.getElementById('subModalProductPhoto').click()">📷</button>
                <img class="photo-preview" id="subModalProductPreview" style="display:none; width:40px; height:40px; border-radius:8px;">
                <button class="success small" onclick="addProductToSubcategory()">➕</button>
            </div>
        </div>
    </div>

    <!-- ===== МОДАЛЬНОЕ ОКНО РЕДАКТИРОВАНИЯ ТОВАРА ===== -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">✏️ Редактирование товара</div>
                <button class="close-btn" onclick="closeEditModal()">✕</button>
            </div>
            <div id="editForm">
                <div class="edit-photo-preview" id="editPhotoPreview">
                    <div class="no-photo">📷 Нет фото</div>
                </div>
                <div class="input-group">
                    <label>📷 Фото товара</label>
                    <input type="file" id="editPhotoInput" accept="image/*" onchange="previewEditPhoto(this)">
                </div>
                <div class="input-group">
                    <label>📝 Название товара</label>
                    <input type="text" id="editName" placeholder="Название">
                </div>
                <div class="input-group">
                    <label>🔢 Артикул</label>
                    <input type="text" id="editSku" placeholder="Артикул">
                </div>
                <div class="input-group">
                    <label>📏 Размер</label>
                    <input type="text" id="editSize" placeholder="Размер (S, M, L, XL)">
                </div>
                <div class="input-group">
                    <label>🔢 Количество</label>
                    <input type="number" id="editQty" placeholder="Количество" min="0">
                </div>
                <div class="input-group">
                    <label>⚠️ Мин. остаток</label>
                    <input type="number" id="editMinStock" placeholder="Мин. остаток" min="0">
                </div>
                <div class="edit-actions">
                    <button class="success" onclick="saveEditProduct()">💾 Сохранить</button>
                    <button class="danger" onclick="deleteEditProduct()">🗑️ Удалить</button>
                    <button class="small" onclick="closeEditModal()">✕ Отмена</button>
                </div>
            </div>
        </div>
    </div>

    <div id="notificationContainer"></div>
    <div id="totalInfo" class="total-info">📊 Загрузка...</div>

    <style>

            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }

            background: white;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            position: relative;
        }
        .category-card:active { transform: scale(0.95); }
        .category-card.active { border-color: #2481cc; }
        .category-card .cat-emoji { font-size: 32px; }
        .category-card .cat-name { font-weight: 600; font-size: 14px; margin-top: 4px; }
        .category-card .cat-count { font-size: 12px; color: #999; }
        .category-card .cat-delete {
            position: absolute;
            top: 4px; right: 8px;
            background: none;
            border: none;
            color: #ff5c5c;
            font-size: 16px;
            cursor: pointer;
            opacity: 0.4;
            width: auto;
            padding: 0 4px;
        }
        .category-card .cat-delete:hover { opacity: 1; }

        .subcategory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }
        .subcategory-card {
            background: white;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            position: relative;
        }
        .subcategory-card:active { transform: scale(0.95); }
        .subcategory-card .sub-photo {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            object-fit: cover;
            margin: 0 auto 6px;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }
        .subcategory-card .sub-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }
        .subcategory-card .sub-name { font-weight: 600; font-size: 13px; }
        .subcategory-card .sub-count { font-size: 11px; color: #999; }
        .subcategory-card .sub-delete {
            position: absolute;
            top: 4px; right: 8px;
            background: none;
            border: none;
            color: #ff5c5c;
            font-size: 14px;
            cursor: pointer;
            opacity: 0.4;
            width: auto;
            padding: 0 4px;
        }
        .subcategory-card .sub-delete:hover { opacity: 1; }

        .add-product-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 12px 0;
            padding: 12px;
            background: rgba(36, 129, 204, 0.05);
            border-radius: 12px;
            align-items: center;
        }
        .add-product-row input { flex: 1; min-width: 80px; padding: 8px 12px; font-size: 14px; }
        .add-product-row input[type="file"] { display: none; }
        .add-product-row .photo-btn {
            padding: 8px 12px;
            font-size: 14px;
            background: #6c5ce7;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            border: none;
            width: auto;
        }
        .add-product-row .photo-preview {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
            background: #e0e0e0;
        }
        .add-product-row button { width: auto; padding: 8px 16px; font-size: 14px; }

        .product-item .p-edit-icon {
            font-size: 18px;
            color: #999;
            opacity: 0.3;
            transition: opacity 0.2s;
            padding: 4px 8px;
            cursor: pointer;
        }
        .product-item:hover .p-edit-icon { opacity: 1; }
        .product-item .p-sku-size { font-size: 11px; color: #666; background: rgba(0,0,0,0.05); padding: 1px 8px; border-radius: 10px; display: inline-block; margin-right: 4px; }
        @media (prefers-color-scheme: dark) {
            .product-item .p-sku-size { color: #aaa; background: rgba(255,255,255,0.05); }
        }
    </style>

    <script>
        // ==================================================
        // ✅ FIREBASE КОНФИГ
        // ==================================================
        const firebaseConfig = {
            apiKey: "AIzaSyC-a15NM1nzH8ELTqlBc6SDtQIIAQ2qu0g",
            authDomain: "sklad-app-898f7.firebaseapp.com",
            projectId: "sklad-app-898f7",
            storageBucket: "sklad-app-898f7.firebasestorage.app",
            messagingSenderId: "617217671865",
            appId: "1:617217671865:web:2a75647e9369d032bb1168"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let categories = [];
        let subcategories = [];
        let products = [];
        let selectedCategoryId = null;
        let currentSubPhotoFile = null;
        let currentProductPhotoFile = null;
        let currentEditPhotoFile = null;
        let editProductId = null;
        let unsubCategories = null;
        let unsubSubcategories = null;
        let unsubProducts = null;
        let currentSubModalId = null;

        // ============================================
        // УВЕДОМЛЕНИЯ
        // ============================================
        function showNotification(message, type = 'info') {
            const container = document.getElementById('notificationContainer');
            const el = document.createElement('div');
            el.className = `notification ${type}`;
            el.textContent = message;
            container.appendChild(el);
            setTimeout(() => el.remove(), 2500);
        }

        function updateSyncStatus(text, status = 'waiting') {
            const el = document.getElementById('syncStatus');
            if (el) {
                el.textContent = text;
                el.className = `sync-status sync-${status}`;
            }
        }

        // ============================================
        // СЖАТИЕ ФОТО
        // ============================================
        function compressImage(file, maxWidth = 300, maxHeight = 300, quality = 0.7) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        let w = img.width, h = img.height;
                        if (w > h) { if (w > maxWidth) { h = h * (maxWidth / w); w = maxWidth; } }
                        else { if (h > maxHeight) { w = w * (maxHeight / h); h = maxHeight; } }
                        const canvas = document.createElement('canvas');
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = 'high';
                        ctx.drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.src = e.target.result;
                };
            });
        }

        function previewSubPhoto(input) {
            const file = input.files[0];
            if (file) {
                currentSubPhotoFile = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('subPhotoPreview').innerHTML = `<img src="${e.target.result}">`;
                };
                reader.readAsDataURL(file);
            }
        }

        function previewProductPhoto(input) {
            const file = input.files[0];
            if (file) {
                currentProductPhotoFile = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    const preview = document.getElementById('subModalProductPreview');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        function previewEditPhoto(input) {
            const file = input.files[0];
            if (file) {
                currentEditPhotoFile = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    const preview = document.getElementById('editPhotoPreview');
                    preview.innerHTML = `<img src="${e.target.result}">`;
                };
                reader.readAsDataURL(file);
            }
        }

        // ============================================
        // КАТЕГОРИИ
        // ============================================
        function listenCategories() {
            if (unsubCategories) unsubCategories();
            unsubCategories = db.collection('categories')
                .onSnapshot((snapshot) => {
                    categories = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        categories.push({ id: doc.id, ...data });
                    });
                    categories.sort((a, b) => a.name.localeCompare(b.name));
                    renderCategories();
                });
        }

        function renderCategories() {
            const grid = document.getElementById('categoryGrid');
            if (categories.length === 0) {
                grid.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>Нет категорий. Создайте первую!</p></div>';
                return;
            }
            let html = '';
            categories.forEach(cat => {
                const subCount = subcategories.filter(s => s.categoryId === cat.id).length;
                const active = selectedCategoryId === cat.id ? 'active' : '';
                html += `
                    <div class="category-card ${active}" onclick="selectCategory('${cat.id}')">
                        <button class="cat-delete" onclick="event.stopPropagation(); deleteCategory('${cat.id}')">✕</button>
                        <div class="cat-emoji">${cat.emoji || '📁'}</div>
                        <div class="cat-name">${escapeHtml(cat.name)}</div>
                        <div class="cat-count">${subCount} подкатегорий</div>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }

        async function addCategory() {
            const nameInput = document.getElementById('newCategoryName');
            const emojiInput = document.getElementById('newCategoryEmoji');
            const name = nameInput.value.trim();
            const emoji = emojiInput.value.trim() || '📁';
            if (!name) { showNotification('Введите название категории', 'error'); return; }
            try {
                await db.collection('categories').add({
                    name: name,
                    emoji: emoji,
                    createdAt: new Date().toISOString()
                });
                nameInput.value = '';
                showNotification(`✅ Категория "${name}" создана`, 'success');
            } catch (e) { showNotification('Ошибка создания', 'error'); console.error(e); }
        }

        async function deleteCategory(categoryId) {
            const cat = categories.find(c => c.id === categoryId);
            if (!cat) return;
            if (!confirm(`Удалить категорию "${cat.name}" со всеми подкатегориями и товарами?`)) return;
            try {
                const subs = subcategories.filter(s => s.categoryId === categoryId);
                for (let sub of subs) {
                    const prods = products.filter(p => p.subcategoryId === sub.id);
                    for (let p of prods) await db.collection('products').doc(p.id).delete();
                    await db.collection('subcategories').doc(sub.id).delete();
                }
                await db.collection('categories').doc(categoryId).delete();
                if (selectedCategoryId === categoryId) { selectedCategoryId = null; document.getElementById('subcategorySection').style.display = 'none'; }
                showNotification(`✅ Категория удалена`, 'success');
            } catch (e) { showNotification('Ошибка удаления', 'error'); console.error(e); }
        }

        function selectCategory(categoryId) {
            selectedCategoryId = categoryId;
            renderCategories();
            const cat = categories.find(c => c.id === categoryId);
            if (cat) {
                document.getElementById('selectedCategoryName').textContent = `${cat.emoji || '📁'} ${cat.name}`;
                document.getElementById('subcategorySection').style.display = 'block';
                document.getElementById('subPhotoPreview').innerHTML = '';
                currentSubPhotoFile = null;
                document.getElementById('subPhotoInput').value = '';
                listenSubcategories(categoryId);
            }
        }

        function closeSubcategorySection() {
            selectedCategoryId = null;
            document.getElementById('subcategorySection').style.display = 'none';
            if (unsubSubcategories) { unsubSubcategories(); unsubSubcategories = null; }
            renderCategories();
        }

        // ============================================
        // ПОДКАТЕГОРИИ
        // ============================================
        function listenSubcategories(categoryId) {
            if (unsubSubcategories) unsubSubcategories();
            unsubSubcategories = db.collection('subcategories')
                .where('categoryId', '==', categoryId)
                .onSnapshot((snapshot) => {
                    subcategories = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        subcategories.push({ id: doc.id, ...data });
                    });
                    subcategories.sort((a, b) => a.name.localeCompare(b.name));
                    renderSubcategories();
                });
        }

        function renderSubcategories() {
            const grid = document.getElementById('subcategoryGrid');
            if (subcategories.length === 0) {
                grid.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>Нет подкатегорий. Добавьте первую!</p></div>';
                return;
            }
            let html = '';
            subcategories.forEach(sub => {
                const prodCount = products.filter(p => p.subcategoryId === sub.id).length;
                const photoHtml = sub.photo 
                    ? `<img src="${sub.photo}" alt="">` 
                    : '📂';
                html += `
                    <div class="subcategory-card" onclick="openSubcategoryModal('${sub.id}')">
                        <div class="sub-photo">${photoHtml}</div>
                        <div class="sub-name">${escapeHtml(sub.name)}</div>
                        <div class="sub-count">${prodCount} товаров</div>
                        <button class="sub-delete" onclick="event.stopPropagation(); deleteSubcategory('${sub.id}')">✕</button>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }

        async function addSubcategory() {
            if (!selectedCategoryId) { showNotification('Сначала выберите категорию', 'error'); return; }
            const nameInput = document.getElementById('newSubcategoryName');
            const name = nameInput.value.trim();
            if (!name) { showNotification('Введите название подкатегории', 'error'); return; }
            try {
                let photoData = null;
                if (currentSubPhotoFile) {
                    photoData = await compressImage(currentSubPhotoFile, 300, 300, 0.7);
                }
                await db.collection('subcategories').add({
                    name: name,
                    categoryId: selectedCategoryId,
                    photo: photoData,
                    createdAt: new Date().toISOString()
                });
                nameInput.value = '';
                document.getElementById('subPhotoPreview').innerHTML = '';
                currentSubPhotoFile = null;
                document.getElementById('subPhotoInput').value = '';
                showNotification(`✅ Подкатегория "${name}" создана`, 'success');
            } catch (e) { showNotification('Ошибка создания', 'error'); console.error(e); }
        }

        async function deleteSubcategory(subcategoryId) {
            const sub = subcategories.find(s => s.id === subcategoryId);
            if (!sub) return;
            const prodCount = products.filter(p => p.subcategoryId === subcategoryId).length;
            let msg = `Удалить подкатегорию "${sub.name}"?`;
            if (prodCount > 0) msg += `\n\n⚠️ В ней ${prodCount} товаров. Они тоже будут удалены!`;
            if (!confirm(msg)) return;
            try {
                const prods = products.filter(p => p.subcategoryId === subcategoryId);
                for (let p of prods) await db.collection('products').doc(p.id).delete();
                await db.collection('subcategories').doc(subcategoryId).delete();
                showNotification(`✅ Подкатегория удалена`, 'success');
            } catch (e) { showNotification('Ошибка удаления', 'error'); console.error(e); }
        }

        // ============================================
        // ТОВАРЫ
        // ============================================
        function listenProducts() {
            if (unsubProducts) unsubProducts();
            unsubProducts = db.collection('products')
                .onSnapshot((snapshot) => {
                    products = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        products.push({ id: doc.id, ...data });
                    });
                    products.sort((a, b) => a.createdAt > b.createdAt ? -1 : 1);
                    renderSubcategories();
                    updateTotal();
                });
        }

        // ============================================
        // МОДАЛЬНОЕ ОКНО ПОДКАТЕГОРИИ
        // ============================================
        function openSubcategoryModal(subcategoryId) {
            currentSubModalId = subcategoryId;
            const sub = subcategories.find(s => s.id === subcategoryId);
            if (!sub) return;
            
            const cat = categories.find(c => c.id === sub.categoryId);
            const catEmoji = cat ? cat.emoji : '📂';
            
            document.getElementById('subModalIcon').textContent = catEmoji;
            document.getElementById('subModalTitle').textContent = sub.name;
            
            const modal = document.getElementById('subModal');
            const list = document.getElementById('subModalProducts');
            const countEl = document.getElementById('subModalCount');
            
            const subProducts = products.filter(p => p.subcategoryId === subcategoryId);
            countEl.textContent = `(${subProducts.length} шт.)`;
            
            if (subProducts.length === 0) {
                list.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>Нет товаров в этой подкатегории</p></div>`;
            } else {
                let html = '';
                subProducts.forEach(p => {
                    const minStock = p.minStock || 5;
                    const isLow = p.quantity <= minStock;
                    const photoHtml = p.photo ? `<img src="${p.photo}">` : '📷';
                    html += `
                        <div class="product-item" onclick="openEditModal('${p.id}')">
                            <div class="p-photo">${photoHtml}</div>
                            <div class="p-info">
                                <div class="p-name">${escapeHtml(p.name)}</div>
                                <div>
                                    <span class="p-sku-size">🔢 ${escapeHtml(p.sku)}</span>
                                    <span class="p-sku-size">📏 ${escapeHtml(p.size)}</span>
                                </div>
                                <div class="p-min-stock" style="font-size:11px; color:#999;">Мин. остаток: ${minStock} шт.</div>
                            </div>
                            <div class="p-qty ${isLow ? 'low' : ''}">${p.quantity}</div>
                            <span class="p-edit-icon">✏️</span>
                        </div>
                    `;
                });
                list.innerHTML = html;
            }
            
            modal.classList.add('show');
            document.body.style.overflow = 'hidden';
            // Очищаем форму добавления
            document.getElementById('subModalProductName').value = '';
            document.getElementById('subModalProductSku').value = '';
            document.getElementById('subModalProductSize').value = '';
            document.getElementById('subModalProductQty').value = '1';
            document.getElementById('subModalProductMinStock').value = '5';
            document.getElementById('subModalProductPreview').style.display = 'none';
            document.getElementById('subModalProductPhoto').value = '';
            currentProductPhotoFile = null;
        }

        function closeSubModal() {
            document.getElementById('subModal').classList.remove('show');
            document.body.style.overflow = 'auto';
        }

        // ============================================
        // ДОБАВЛЕНИЕ ТОВАРА
        // ============================================
        async function addProductToSubcategory() {
            if (!currentSubModalId) { showNotification('Ошибка: подкатегория не выбрана', 'error'); return; }
            const name = document.getElementById('subModalProductName').value.trim();
            const sku = document.getElementById('subModalProductSku').value.trim();
            const size = document.getElementById('subModalProductSize').value.trim().toUpperCase();
            const qty = parseInt(document.getElementById('subModalProductQty').value) || 0;
            const minStock = parseInt(document.getElementById('subModalProductMinStock').value) || 5;
            
            if (!name) { showNotification('Введите название товара', 'error'); return; }
            if (!sku) { showNotification('Введите артикул', 'error'); return; }
            if (!size) { showNotification('Введите размер', 'error'); return; }
            
            // Проверка на дубликат
            const existing = products.find(p => p.sku === sku && p.size === size);
            if (existing) {
                showNotification(`❌ Товар с артикулом "${sku}" и размером "${size}" уже существует!`, 'error');
                return;
            }
            
            try {
                let photoData = null;
                if (currentProductPhotoFile) {
                    photoData = await compressImage(currentProductPhotoFile, 300, 300, 0.7);
                }
                
                await db.collection('products').add({
                    name: name,
                    sku: sku,
                    size: size,
                    quantity: qty,
                    subcategoryId: currentSubModalId,
                    minStock: minStock,
                    photo: photoData,
                    createdAt: new Date().toISOString()
                });
                showNotification(`✅ Товар "${name}" (${sku} / ${size}) добавлен`, 'success');
                openSubcategoryModal(currentSubModalId);
            } catch (e) { showNotification('Ошибка добавления', 'error'); console.error(e); }
        }

        // ============================================
        // РЕДАКТИРОВАНИЕ ТОВАРА
        // ============================================
        function openEditModal(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            editProductId = productId;
            
            document.getElementById('editName').value = product.name || '';
            document.getElementById('editSku').value = product.sku || '';
            document.getElementById('editSize').value = product.size || '';
            document.getElementById('editQty').value = product.quantity || 0;
            document.getElementById('editMinStock').value = product.minStock || 5;
            
            // Фото
            const preview = document.getElementById('editPhotoPreview');
            if (product.photo) {
                preview.innerHTML = `<img src="${product.photo}">`;
            } else {
                preview.innerHTML = `<div class="no-photo">📷 Нет фото</div>`;
            }
            document.getElementById('editPhotoInput').value = '';
            currentEditPhotoFile = null;
            
            document.getElementById('editModal').classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
            document.body.style.overflow = 'auto';
            editProductId = null;
            currentEditPhotoFile = null;
        }

        async function saveEditProduct() {
            if (!editProductId) return;
            
            const name = document.getElementById('editName').value.trim();
            const sku = document.getElementById('editSku').value.trim();
            const size = document.getElementById('editSize').value.trim().toUpperCase();
            const qty = parseInt(document.getElementById('editQty').value) || 0;
            const minStock = parseInt(document.getElementById('editMinStock').value) || 5;
            
            if (!name) { showNotification('Введите название', 'error'); return; }
            if (!sku) { showNotification('Введите артикул', 'error'); return; }
            if (!size) { showNotification('Введите размер', 'error'); return; }
            
            try {
                let photoData = null;
                if (currentEditPhotoFile) {
                    photoData = await compressImage(currentEditPhotoFile, 300, 300, 0.7);
                }
                
                const updateData = {
                    name: name,
                    sku: sku,
                    size: size,
                    quantity: qty,
                    minStock: minStock
                };
                
                if (photoData) {
                    updateData.photo = photoData;
                }
                
                await db.collection('products').doc(editProductId).update(updateData);
                
                showNotification(`✅ Товар "${name}" обновлён`, 'success');
                closeEditModal();
                if (currentSubModalId) openSubcategoryModal(currentSubModalId);
            } catch (e) {
                showNotification('❌ Ошибка сохранения: ' + e.message, 'error');
                console.error(e);
            }
        }

        async function deleteEditProduct() {
            if (!editProductId) return;
            const product = products.find(p => p.id === editProductId);
            if (!product) return;
            if (!confirm(`Удалить товар "${product.name}" (${product.sku} / ${product.size})?`)) return;
            
            try {
                await db.collection('products').doc(editProductId).delete();
                showNotification(`✅ Товар удалён`, 'success');
                closeEditModal();
                if (currentSubModalId) openSubcategoryModal(currentSubModalId);
            } catch (e) {
                showNotification('❌ Ошибка удаления', 'error');
                console.error(e);
            }
        }

        // ============================================
        // ИЗМЕНЕНИЕ КОЛИЧЕСТВА (быстрое)
        // ============================================
        async function changeProductQty(productId, delta) {
            const p = products.find(p => p.id === productId);
            if (!p) return;
            const newQty = Math.max(0, p.quantity + delta);
            try {
                await db.collection('products').doc(productId).update({ quantity: newQty });
                if (newQty <= (p.minStock || 5)) {
                    showNotification(`⚠️ ${p.name}: осталось ${newQty} шт.`, 'error');
                }
                if (currentSubModalId) openSubcategoryModal(currentSubModalId);
            } catch (e) { console.error(e); }
        }

        // ============================================
        // ОБНОВЛЕНИЕ СТАТИСТИКИ
        // ============================================
        function updateTotal() {
            const total = products.length;
            const totalQty = products.reduce((sum, p) => sum + p.quantity, 0);
            document.getElementById('totalInfo').textContent = `📊 Всего: ${total} товаров | На складе: ${totalQty} шт.`;
            if (selectedCategoryId) renderSubcategories();
        }

        // ============================================
        // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        // ============================================
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
        }

        // ============================================
        // ЗАПУСК
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            listenCategories();
            listenProducts();
            updateSyncStatus('✅ Готово', 'online');
        });
    </script>
</body>
</html>

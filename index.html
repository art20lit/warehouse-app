<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Общий склад - Категории и подкатегории</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #ffffff;
            color: #000000;
            padding: 16px;
            padding-bottom: 100px;
        }

        /* ===== СВЕТЛАЯ ТЕМА ===== */
        .product-name { 
            font-weight: 600; 
            font-size: 18px; 
            margin-bottom: 4px; 
            color: #000000;
        }

        /* ===== ТЁМНАЯ ТЕМА ===== */
        @media (prefers-color-scheme: dark) {
            body { background: #1a1a1a; color: #ffffff; }
            .add-form, .product-card, .search-section, .category-filter, .stats-grid .stat-card,
            .category-manager, .subcategory-manager { background: #2d2d2d !important; }
            input, select { background: #1a1a1a; color: #ffffff; border-color: #444; }
            .total-info { background: #2d2d2d; border-top-color: #444; }
            .product-name { color: #ffffff !important; }
            .product-category { color: #aaaaaa !important; }
            .stat-card .stat-label { color: #aaaaaa !important; }
            .stat-card .stat-value { color: #ffffff !important; }
            .modal-content { background: #2d2d2d !important; }
            .modal-product-item { border-bottom-color: #444 !important; }
            .modal-product-item .item-details { color: #aaaaaa !important; }
            .modal-quantity-control input { background: #1a1a1a; color: #ffffff; border-color: #444; }
            .category-chip { background: #1a1a1a !important; }
            .subcategory-chip { background: #1a1a1a !important; }
        }

        /* ===== КАТЕГОРИИ И ПОДКАТЕГОРИИ ===== */
        .category-manager {
            background: #f0f0f0;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 16px;
        }
        .category-manager .add-category-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .category-manager .add-category-row input {
            flex: 1;
            min-width: 120px;
        }
        .category-manager .add-category-row button {
            width: auto;
            padding: 12px 20px;
        }
        .category-manager .category-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .category-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: white;
            border-radius: 20px;
            border: 1px solid #ccc;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .category-chip.active {
            background: #2481cc;
            color: white;
            border-color: #2481cc;
        }
        .category-chip .delete-cat {
            font-size: 14px;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
            background: none;
            border: none;
            width: auto;
            padding: 0 2px;
        }
        .category-chip .delete-cat:hover {
            opacity: 1;
        }
        .category-chip .emoji {
            font-size: 16px;
        }

        .subcategory-manager {
            background: #f0f0f0;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 16px;
            display: none;
        }
        .subcategory-manager.show {
            display: block;
        }
        .subcategory-manager .add-subcategory-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .subcategory-manager .add-subcategory-row input {
            flex: 1;
            min-width: 120px;
        }
        .subcategory-manager .add-subcategory-row button {
            width: auto;
            padding: 12px 20px;
        }
        .subcategory-manager .subcategory-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .subcategory-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: #e8f0fe;
            border-radius: 16px;
            font-size: 12px;
            border: 1px solid #ccc;
            cursor: pointer;
            transition: all 0.2s;
        }
        .subcategory-chip.active {
            background: #00b894;
            color: white;
            border-color: #00b894;
        }
        .subcategory-chip .delete-sub {
            font-size: 12px;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
            background: none;
            border: none;
            width: auto;
            padding: 0 2px;
        }
        .subcategory-chip .delete-sub:hover {
            opacity: 1;
        }
        .subcategory-manager .selected-category-info {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
            padding: 8px 12px;
            background: rgba(36, 129, 204, 0.1);
            border-radius: 10px;
        }
        .subcategory-manager .selected-category-info strong {
            color: #2481cc;
        }

        /* ===== СТАТИСТИКА ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: #f0f0f0;
            padding: 12px 8px;
            border-radius: 12px;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            user-select: none;
        }
        .stat-card:active { transform: scale(0.95); }
        .stat-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .stat-card .stat-icon { font-size: 24px; margin-bottom: 4px; }
        .stat-card .stat-value { font-size: 20px; font-weight: 700; color: #000000; }
        .stat-card .stat-label { font-size: 11px; color: #666; margin-top: 2px; }
        .stat-card .stat-value.jeans { color: #2481cc; }
        .stat-card .stat-value.shorts { color: #00b894; }
        .stat-card .stat-value.low { color: #ff5c5c; }
        .stat-card .stat-value.total { color: #6c5ce7; }
        .stat-card.low-stock-card {
            border: 2px solid #ff5c5c;
            position: relative;
        }
        .stat-card.low-stock-card .stat-value.low { animation: pulse 2s infinite; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .stat-card.low-stock-card .low-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #ff5c5c;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        /* ===== МОДАЛЬНОЕ ОКНО ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 16px;
            overflow-y: auto;
        }
        .modal-overlay.show { display: flex; }
        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 550px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 24px;
            position: relative;
            animation: modalSlideIn 0.3s ease;
        }
        @keyframes modalSlideIn {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #ff5c5c;
        }
        .modal-header h2 { font-size: 20px; color: #ff5c5c; }
        .modal-header .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            width: auto;
            padding: 0 8px;
        }
        .modal-header .close-btn:hover { color: #ff5c5c; }
        .modal-product-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .modal-product-item:last-child { border-bottom: none; }
        .modal-product-item .item-photo {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .modal-product-item .item-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }
        .modal-product-item .item-info { flex: 1; }
        .modal-product-item .item-name { font-weight: 600; font-size: 15px; }
        .modal-product-item .item-details { font-size: 12px; color: #666; }
        .modal-quantity-control {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .modal-quantity-control .qty-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .modal-quantity-control .qty-btn.minus { background: rgba(255, 92, 92, 0.15); color: #ff5c5c; }
        .modal-quantity-control .qty-btn.plus { background: rgba(0, 184, 148, 0.15); color: #00b894; }
        .modal-quantity-control input {
            width: 50px;
            text-align: center;
            padding: 4px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            background: white;
        }
        .modal-quantity-control input:focus {
            outline: none;
            border-color: #2481cc;
        }
        .modal-empty {
            text-align: center;
            padding: 30px 0;
            color: #999;
        }
        .modal-empty .empty-icon { font-size: 48px; margin-bottom: 12px; }

        /* ===== ОСТАЛЬНЫЕ СТИЛИ ===== */
        .header { margin-bottom: 20px; text-align: center; }
        h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .add-form, .search-section, .category-filter {
            background: #f0f0f0;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 16px;
        }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 14px; margin-bottom: 6px; color: #666; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 12px;
            background: white;
            color: black;
            font-size: 16px;
        }
        select { cursor: pointer; }
        button {
            background: #2481cc;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
        }
        button:active { opacity: 0.7; }
        button.small-btn { width: auto; padding: 8px 16px; font-size: 14px; }
        button.danger { background: #ff5c5c; }
        button.success { background: #00b894; }
        .photo-preview { margin-top: 10px; text-align: center; }
        .photo-preview img { max-width: 100px; max-height: 100px; border-radius: 12px; }
        .product-card {
            background: #f9f9f9;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            animation: fadeIn 0.15s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .product-card.low-stock { border-left: 4px solid #ff5c5c; background: rgba(255, 92, 92, 0.1); }
        .product-header { display: flex; gap: 12px; margin-bottom: 12px; }
        .product-photo { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; background: #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .product-info { flex: 1; }
        .product-category { font-size: 12px; color: #666; margin-bottom: 4px; }
        .product-subcategory { font-size: 11px; color: #999; margin-bottom: 2px; }
        .product-quantity { font-size: 20px; font-weight: bold; color: #2481cc; }
        .quantity-control { display: flex; align-items: center; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .quantity-control input { width: 80px; text-align: center; padding: 8px; }
        .action-btn { width: 40px; height: 40px; border-radius: 20px; font-size: 20px; font-weight: bold; border: none; cursor: pointer; }
        .action-btn.minus { background: rgba(255, 92, 92, 0.2); color: #ff5c5c; }
        .action-btn.plus { background: rgba(0, 184, 148, 0.2); color: #00b894; }
        .delete-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: #999; margin-left: auto; }
        .search-box { display: flex; gap: 8px; align-items: center; }
        .search-box input { flex: 1; }
        .notification { position: fixed; bottom: 100px; left: 16px; right: 16px; background: #ff5c5c; color: white; padding: 12px; border-radius: 12px; text-align: center; z-index: 200; animation: fadeIn 0.2s; }
        .total-info { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: #808080; 
            padding: 12px 16px; 
            border-top: 1px solid #ddd; 
            text-align: center; 
            font-weight: 500; 
            z-index: 100; 
            font-size: 13px; 
            color: #ffffff;
        }
        .empty-state { text-align: center; padding: 40px; color: #999; }
        .sync-status {
            font-size: 12px;
            text-align: center;
            margin-top: 5px;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
        }
        .sync-online { background: rgba(0, 184, 148, 0.15); color: #00b894; }
        .sync-offline { background: rgba(255, 92, 92, 0.15); color: #ff5c5c; }
        .sync-waiting { background: rgba(36, 129, 204, 0.15); color: #2481cc; }
        .button-group { display: flex; gap: 8px; justify-content: center; margin-top: 8px; flex-wrap: wrap; }
        .refresh-btn { padding: 8px 16px; font-size: 14px; width: auto; background: #2481cc; color: white; border: none; border-radius: 20px; cursor: pointer; }
        .compress-info {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
            text-align: center;
        }
        .compress-info span { background: #2481cc20; padding: 2px 8px; border-radius: 10px; }
        
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .stat-card .stat-value { font-size: 18px; }
            .stat-card .stat-icon { font-size: 20px; }
            .modal-content { padding: 16px; max-height: 90vh; }
            .modal-product-item { flex-wrap: wrap; }
            .modal-product-item .item-actions { width: 100%; justify-content: flex-end; }
            .category-manager .add-category-row button,
            .subcategory-manager .add-subcategory-row button { font-size: 13px; padding: 10px 14px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>👖🩳 Общий склад</h1>
        <div style="text-align: center;">
            <div class="sync-status sync-waiting" id="syncStatus">
                🔄 Подключение к облаку...
            </div>
        </div>
        <div class="button-group">
            <button class="refresh-btn" id="refreshBtn">🔄 Синхронизировать</button>
        </div>
    </div>

    <!-- ===== БЛОК СТАТИСТИКИ ===== -->
    <div class="stats-grid">
        <div class="stat-card" id="statTotal">
            <div class="stat-icon">📦</div>
            <div class="stat-value total" id="totalCount">0</div>
            <div class="stat-label">Всего товаров</div>
        </div>
        <div class="stat-card" id="statJeans">
            <div class="stat-icon">👖</div>
            <div class="stat-value jeans" id="jeansCount">0</div>
            <div class="stat-label">Джинсы</div>
        </div>
        <div class="stat-card" id="statShorts">
            <div class="stat-icon">🩳</div>
            <div class="stat-value shorts" id="shortsCount">0</div>
            <div class="stat-label">Шорты</div>
        </div>
        <div class="stat-card low-stock-card" id="statLow" onclick="showLowStockModal()">
            <div class="stat-icon">⚠️</div>
            <div class="stat-value low" id="lowStockCount">0</div>
            <div class="stat-label">Заканчиваются</div>
            <div class="low-badge" id="lowBadge" style="display:none;">!</div>
        </div>
    </div>

    <!-- ===== УПРАВЛЕНИЕ КАТЕГОРИЯМИ ===== -->
    <div class="category-manager">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <label style="font-weight:600; margin:0;">📂 Управление категориями</label>
            <button class="small-btn" onclick="document.getElementById('subcategoryManager').classList.toggle('show')" style="width:auto;">📋 Подкатегории</button>
        </div>
        <div class="add-category-row">
            <input type="text" id="newCategoryName" placeholder="Название категории">
            <input type="text" id="newCategoryEmoji" placeholder="Emoji" style="max-width:60px;" value="📁">
            <button class="small-btn success" onclick="addCategory()">➕</button>
        </div>
        <div class="category-list" id="categoryList">
            <!-- Категории будут загружены сюда -->
        </div>
    </div>

    <!-- ===== УПРАВЛЕНИЕ ПОДКАТЕГОРИЯМИ ===== -->
    <div class="subcategory-manager" id="subcategoryManager">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <label style="font-weight:600; margin:0;">📋 Управление подкатегориями</label>
            <button class="small-btn" onclick="document.getElementById('subcategoryManager').classList.toggle('show')" style="width:auto;">✕ Закрыть</button>
        </div>
        <div class="selected-category-info" id="selectedCategoryInfo">
            Выберите категорию выше
        </div>
        <div class="add-subcategory-row">
            <input type="text" id="newSubcategoryName" placeholder="Название подкатегории">
            <button class="small-btn success" onclick="addSubcategory()">➕</button>
        </div>
        <div class="subcategory-list" id="subcategoryList">
            <!-- Подкатегории будут загружены сюда -->
        </div>
    </div>

    <!-- ===== МОДАЛЬНОЕ ОКНО ===== -->
    <div class="modal-overlay" id="lowStockModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⚠️ Товары заканчиваются</h2>
                <button class="close-btn" onclick="closeLowStockModal()">✕</button>
            </div>
            <div id="modalProductList"></div>
        </div>
    </div>

    <div class="add-form">
        <div class="input-group">
            <label>📷 Фото товара</label>
            <input type="file" id="productPhoto" accept="image/*">
            <div class="photo-preview" id="photoPreview"></div>
            <div class="compress-info">
                <span>🔄 Фото сжимается автоматически (до 50-100 КБ)</span>
            </div>
        </div>
        <div class="input-group">
            <label>📝 Название товара</label>
            <input type="text" id="productName" placeholder="Например: Джинсы slim">
        </div>
        <div class="input-group">
            <label>📁 Категория</label>
            <select id="productCategory">
                <option value="">Выберите категорию...</option>
            </select>
        </div>
        <div class="input-group">
            <label>📂 Подкатегория</label>
            <select id="productSubcategory">
                <option value="">Нет подкатегории</option>
            </select>
        </div>
        <div class="input-group">
            <label>🔢 Количество</label>
            <input type="number" id="productQuantity" value="1" min="0">
        </div>
        <div class="input-group">
            <label>⚠️ Мин. остаток</label>
            <input type="number" id="productMinStock" value="5" min="0">
        </div>
        <button id="addBtn">➕ Добавить товар</button>
    </div>

    <div class="search-section">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Поиск товаров...">
        </div>
    </div>

    <div id="productsList"></div>
    <div id="totalInfo" class="total-info"></div>
    <div id="notificationContainer"></div>

    <script>
        // ==================================================
        // ✅ FIREBASE КОНФИГ
        // ==================================================
        const firebaseConfig = {
            apiKey: "AIzaSyC-a15NM1nzH8ELTqlBc6SDtQIIAQ2qu0g",
            authDomain: "sklad-app-898f7.firebaseapp.com",
            projectId: "sklad-app-898f7",
            storageBucket: "sklad-app-898f7.firebasestorage.app",
            messagingSenderId: "617217671865",
            appId: "1:617217671865:web:2a75647e9369d032bb1168"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let products = [];
        let categories = [];
        let subcategories = [];
        let currentFilter = 'all';
        let searchQuery = '';
        let unsubscribe = null;
        let categoriesUnsubscribe = null;
        let subcategoriesUnsubscribe = null;

        // ============================================
        // 🔥 РАБОТА С КАТЕГОРИЯМИ
        // ============================================
        function listenCategories() {
            if (categoriesUnsubscribe) {
                categoriesUnsubscribe();
            }
            
            categoriesUnsubscribe = db.collection('categories')
                .onSnapshot((snapshot) => {
                    categories = [];
                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        categories.push({
                            id: doc.id,
                            name: data.name || 'Без названия',
                            emoji: data.emoji || '📁',
                            createdAt: data.createdAt || new Date().toISOString()
                        });
                    });
                    
                    categories.sort((a, b) => a.name.localeCompare(b.name));
                    renderCategories();
                    updateCategorySelect();
                }, (error) => {

            try {

                const subcats = subcategories.filter(s => s.categoryId === categoryId);
                for (let sub of subcats) {
                    await db.collection('subcategories').doc(sub.id).delete();

                // Удаляем категорию
                await db.collection('categories').doc(categoryId).delete();
                
                // Обновляем товары (убираем категорию)
                const productsToUpdate = products.filter(p => p.categoryId === categoryId);
                for (let p of productsToUpdate) {
                    await db.collection('products').doc(p.id).update({
                        categoryId: '',
                        category: '',
                        subcategoryId: ''
                    });
                }
                
                showNotification(`✅ Категория "${category.name}" удалена`, false);

        // ============================================
        // СЖАТИЕ ИЗОБРАЖЕНИЙ
        // ============================================
        function compressImage(file, maxWidth = 400, maxHeight = 400, quality = 0.6) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > height) {
                            if (width > maxWidth) {
                                height = Math.round(height * (maxWidth / width));
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width = Math.round(width * (maxHeight / height));
                                height = maxHeight;
                            }
                        }
                        
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = 'high';
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
                        resolve(compressedDataUrl);
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
            });
        }

        async function modalChangeQuantity(id, delta) {
            const p = products.find(p => p.id === id);
            if (p) {
                const newQuantity = Math.max(0, p.quantity + delta);
                await modalSetQuantity(id, newQuantity);
            }
        }

        async function modalSetQuantity(id, newValue) {
            const p = products.find(p => p.id === id);
            if (p) {
                const quantity = Math.max(0, parseInt(newValue, 10) || 0);
                
                try {
                    await db.collection('products').doc(id).update({
                        quantity: quantity
                    });
                    
                    const input = document.getElementById(`modal-qty-${id}`);
                    if (input) {
                        input.value = quantity;
                    }
                    
                    if (quantity <= p.minStock) {
                        showNotification(`⚠️ ${p.name}: осталось ${quantity} шт.`, true);
                    } else {
                        showNotification(`✅ ${p.name}: теперь ${quantity} шт.`, false);
                        setTimeout(() => {
                            showLowStockModal();
                        }, 500);
                    }
                } catch (error) {
                    console.error('Ошибка обновления:', error);
                    showNotification('❌ Ошибка обновления количества', true);
                }
            }
        }

            showNotification(`📤 Сохранение "${name}"...`, false);
            
            const category = categories.find(c => c.id === categoryId);
            const subcategory = subcategories.find(s => s.id === subcategoryId);
            
            try {
                await db.collection('products').add({
                    name: name,
                    quantity: quantity,
                    categoryId: categoryId || '',
                    category: category ? category.name : '',
                    subcategoryId: subcategoryId || '',
                    subcategory: subcategory ? subcategory.name : '',
                    minStock: minStock,
                    photo: photoData,
                    createdAt: new Date().toISOString()
                });
                
                showNotification(`✅ Добавлен: ${name}`, false);
                clearForm();
                
            } catch (error) {
                console.error('Ошибка добавления:', error);
                showNotification(`❌ Ошибка: "${name}" не сохранён`, true);

        async function addProduct() {
            const name = document.getElementById('productName').value.trim();
            const quantity = parseInt(document.getElementById('productQuantity').value, 10) || 0;
            const categoryId = document.getElementById('productCategory').value;
            const subcategoryId = document.getElementById('productSubcategory').value;
            const minStock = parseInt(document.getElementById('productMinStock').value, 10) || 5;
            const photoInput = document.getElementById('productPhoto');
            
            if (!name) { alert('Введите название'); return; }
            if (!categoryId) { alert('Выберите категорию'); return; }
            
            const btn = document.getElementById('addBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Обработка...';
            
            try {
                let photoData = null;
                
                if (photoInput.files && photoInput.files[0]) {
                    btn.textContent = '📸 Сжатие фото...';
                    photoData = await compressImage(photoInput.files[0], 400, 400, 0.6);
                    showNotification('✅ Фото сжато', false);
                }
                
                btn.textContent = '💾 Сохранение...';
                await addProductLogic(name, quantity, categoryId, subcategoryId, minStock, photoData);
                
            } catch (error) {
                console.error('Ошибка:', error);
                showNotification('❌ Ошибка обработки фото', true);
            } finally {
                btn.disabled = false;
                btn.textContent = '➕ Добавить товар';
            }
        }

        // ============================================
        // ФИЛЬТРАЦИЯ
        // ============================================
        function getFiltered() {
            return products.filter(p => {
                if (currentFilter !== 'all' && p.categoryId !== currentFilter) return false;
                if (searchQuery && !p.name.toLowerCase().includes(searchQuery.toLowerCase())) return false;
                return true;
            });
        }

        function renderProducts() {
            const container = document.getElementById('productsList');
            const totalSpan = document.getElementById('totalInfo');
            const filtered = getFiltered();
            if (!container) return;
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state">✨ Товары не найдены ✨</div>';
                totalSpan.innerHTML = `📊 Всего товаров: ${products.length}`;
                return;
            }
            
            let totalQty = 0;
            let html = '';
            for (let p of filtered) {
                totalQty += p.quantity;
                const isLow = p.quantity <= p.minStock;
                const category = categories.find(c => c.id === p.categoryId);
                const catEmoji = category ? category.emoji : '📁';
                const catName = category ? category.name : 'Без категории';
                const subName = p.subcategory ? ` → ${p.subcategory}` : '';
                
                html += `
                    <div class="product-card ${isLow ? 'low-stock' : ''}">
                        <div class="product-header">
                            ${p.photo ? `<img class="product-photo" src="${p.photo}" loading="lazy">` : '<div class="product-photo">📷</div>'}
                            <div class="product-info">
                                <div class="product-name">${escapeHtml(p.name)}</div>
                                <div class="product-category">${catEmoji} ${catName}${subName}</div>
                                <div class="product-quantity">${p.quantity} шт.</div>
                            </div>
                            <button class="delete-btn" onclick="deleteProduct('${p.id}')">🗑️</button>
                        </div>
                        <div class="quantity-control">
                            <button class="action-btn minus" onclick="changeQuantity('${p.id}', -1)">−</button>
                            <input type="number" value="${p.quantity}" onchange="setQuantity('${p.id}', this.value)" min="0">
                            <button class="action-btn plus" onclick="changeQuantity('${p.id}', 1)">+</button>
                            ${isLow ? '<span style="color:#ff5c5c;">⚠️ Мало!</span>' : ''}
                        </div>
                        <div style="font-size:11px; color:#999;">Мин. остаток: ${p.minStock} шт.</div>
                    </div>
                `;
            }
            container.innerHTML = html;
            totalSpan.innerHTML = `📊 Всего: ${products.length} | На складе: ${totalQty} шт. | Показано: ${filtered.length}`;
        }

        function escapeHtml(str) { 
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) { 
                if (m === '&') return '&amp;'; 
                if (m === '<') return '&lt;'; 
                if (m === '>') return '&gt;'; 
                return m; 
            }); 
        }
        
        function setupPhotoPreview() {
            const input = document.getElementById('productPhoto');
            const preview = document.getElementById('photoPreview');
            if (input) input.onchange = () => {
                if (input.files && input.files[0]) {
                    const reader = new FileReader();
                    reader.onload = e => preview.innerHTML = `<img src="${e.target.result}">`;
                    reader.readAsDataURL(input.files[0]);
                } else preview.innerHTML = '';
            };
        }
        
        function setupSelectHandlers() {
            const categorySelect = document.getElementById('productCategory');
            const subcategorySelect = document.getElementById('productSubcategory');
            
            if (categorySelect) {
                categorySelect.addEventListener('change', function() {
                    updateSubcategorySelect();
                    // Выбираем категорию для фильтрации
                    if (this.value) {
                        selectedCategoryId = this.value;
                        renderSubcategories();
                    }
                });
            }
        }
        
        // ============================================
        // ЗАПУСК
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            setupPhotoPreview();
            setupSelectHandlers();
            listenCategories();
            listenSubcategories();
            listenToFirebase();
            
            document.getElementById('addBtn')?.addEventListener('click', addProduct);
            document.getElementById('refreshBtn')?.addEventListener('click', () => {
                listenToFirebase();
                showNotification('🔄 Данные обновлены', false);
            });
            document.getElementById('searchInput')?.addEventListener('input', (e) => { searchQuery = e.target.value; renderProducts(); });
            document.getElementById('productName')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') addProduct(); });
        });
    </script>
</body>
</html>

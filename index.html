<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Общий склад - Категории и подкатегории</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            color: #000000;
            padding: 16px;
            padding-bottom: 100px;
        }

        @media (prefers-color-scheme: dark) {
            body { background: #1a1a1a; color: #ffffff; }
            .card, .category-card, .subcategory-card, .modal-content { background: #2d2d2d !important; }
            input, select, textarea { background: #1a1a1a; color: #ffffff; border-color: #444; }
            .total-info { background: #2d2d2d; border-top-color: #444; }
            .product-name { color: #ffffff !important; }
            .product-category { color: #aaaaaa !important; }
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 24px; font-weight: 700; }

        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #666; }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 15px;
        }
        textarea { resize: vertical; min-height: 60px; font-family: inherit; }

        button {
            background: #2481cc;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:active { opacity: 0.7; }
        button.success { background: #00b894; }
        button.danger { background: #ff5c5c; }
        button.warning { background: #fdcb6e; color: #333; }
        button.small { padding: 6px 14px; font-size: 13px; width: auto; }

        /* ===== КАТЕГОРИИ ===== */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }
        .category-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .category-card:active { transform: scale(0.95); }
        .category-card.active { border-color: #2481cc; }
        .category-card .cat-emoji { font-size: 32px; }
        .category-card .cat-name { font-weight: 600; font-size: 14px; margin-top: 4px; }
        .category-card .cat-count { font-size: 12px; color: #999; }
        .category-card .cat-delete {
            position: relative;
            float: right;
            background: none;
            border: none;
            color: #ff5c5c;
            font-size: 16px;
            cursor: pointer;
            padding: 0 4px;
            opacity: 0.5;
            width: auto;
        }
        .category-card .cat-delete:hover { opacity: 1; }

        /* ===== ПОДКАТЕГОРИИ ===== */
        .subcategory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }
        .subcategory-card {
            background: white;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
        }
        .subcategory-card:active { transform: scale(0.95); }
        .subcategory-card .sub-photo {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            object-fit: cover;
            margin: 0 auto 6px;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }
        .subcategory-card .sub-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }
        .subcategory-card .sub-name { font-weight: 600; font-size: 13px; }
        .subcategory-card .sub-count { font-size: 11px; color: #999; }
        .subcategory-card .sub-delete {
            background: none;
            border: none;
            color: #ff5c5c;
            font-size: 14px;
            cursor: pointer;
            opacity: 0.4;
            width: auto;
            padding: 0 4px;
        }
        .subcategory-card .sub-delete:hover { opacity: 1; }
        .subcategory-card .sub-actions {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-top: 4px;
        }

        /* ===== ТОВАРЫ ===== */
        .product-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .product-item:last-child { border-bottom: none; }
        .product-item .p-photo {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            object-fit: cover;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }
        .product-item .p-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }
        .product-item .p-info { flex: 1; }
        .product-item .p-name { font-weight: 600; font-size: 14px; }
        .product-item .p-details { font-size: 12px; color: #999; }
        .product-item .p-qty {
            font-weight: 700;
            font-size: 16px;
            color: #000000;
            min-width: 36px;
            text-align: center;
        }
        .product-item .p-qty.low { color: #ff5c5c; }
        .product-item .p-controls {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .product-item .p-controls button {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 16px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .product-item .p-controls button.minus { background: rgba(255, 92, 92, 0.15); color: #ff5c5c; }
        .product-item .p-controls button.plus { background: rgba(0, 184, 148, 0.15); color: #00b894; }
        .product-item .p-delete {
            background: none;
            border: none;
            color: #ff5c5c;
            font-size: 16px;
            cursor: pointer;
            opacity: 0.3;
            width: auto;
            padding: 0 4px;
        }
        .product-item .p-delete:hover { opacity: 1; }

        /* ===== МОДАЛЬНОЕ ОКНО ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: flex-start;
            justify-content: center;
            padding: 30px 16px;
            overflow-y: auto;
        }
        .modal-overlay.show { display: flex; }
        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 550px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 24px;
            animation: slideIn 0.25s ease;
        }
        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #2481cc;
        }
        .modal-header .modal-title { font-size: 20px; font-weight: 700; }
        .modal-header .modal-title .icon { margin-right: 6px; }
        .modal-header .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            width: auto;
            padding: 0 8px;
        }
        .modal-header .close-btn:hover { color: #ff5c5c; }

        .add-product-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 12px 0;
            padding: 12px;
            background: rgba(36, 129, 204, 0.05);
            border-radius: 12px;
        }
        .add-product-row input { flex: 1; min-width: 100px; padding: 8px 12px; font-size: 14px; }
        .add-product-row button { width: auto; padding: 8px 16px; font-size: 14px; }

        .empty-state { text-align: center; padding: 30px 0; color: #999; }
        .empty-state .icon { font-size: 48px; margin-bottom: 8px; }

        .total-info {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #808080;
            padding: 10px 16px;
            text-align: center;
            font-weight: 500;
            z-index: 100;
            font-size: 13px;
            color: #ffffff;
        }
        .sync-status {
            font-size: 12px;
            text-align: center;
            padding: 4px 16px;
            border-radius: 20px;
            display: inline-block;
        }
        .sync-online { background: rgba(0, 184, 148, 0.15); color: #00b894; }
        .sync-offline { background: rgba(255, 92, 92, 0.15); color: #ff5c5c; }
        .sync-waiting { background: rgba(36, 129, 204, 0.15); color: #2481cc; }
        .notification {
            position: fixed;
            bottom: 80px;
            left: 16px; right: 16px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            z-index: 200;
            animation: slideIn 0.2s;
        }
        .notification.success { background: #00b894; color: white; }
        .notification.error { background: #ff5c5c; color: white; }
        .notification.info { background: #2481cc; color: white; }

        .photo-preview { margin-top: 8px; text-align: center; }
        .photo-preview img { max-width: 120px; max-height: 120px; border-radius: 12px; }

        @media (max-width: 480px) {
            .category-grid { grid-template-columns: repeat(2, 1fr); }
            .subcategory-grid { grid-template-columns: repeat(2, 1fr); }
            .product-item { flex-wrap: wrap; }
            .product-item .p-controls { width: 100%; justify-content: flex-end; }
            .add-product-row { flex-direction: column; }
            .add-product-row button { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📦 Управление складом</h1>
        <div style="margin-top:4px;">
            <span class="sync-status sync-waiting" id="syncStatus">🔄 Подключение...</span>
        </div>
    </div>

    <!-- ===== КАТЕГОРИИ ===== -->
    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:12px;">
            <h3 style="font-size:18px;">📂 Категории</h3>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <input type="text" id="newCategoryName" placeholder="Название категории" style="width:160px; padding:8px 12px;">
                <input type="text" id="newCategoryEmoji" placeholder="Emoji" style="width:60px; padding:8px 12px; text-align:center;" value="📁">
                <button class="success small" onclick="addCategory()">➕ Создать</button>
            </div>
        </div>
        <div class="category-grid" id="categoryGrid"></div>
    </div>

    <!-- ===== ПОДКАТЕГОРИИ ===== -->
    <div class="card" id="subcategorySection" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:12px;">
            <h3 style="font-size:18px;" id="subcategoryTitle">📂 <span id="selectedCategoryName">Выберите категорию</span></h3>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <input type="file" id="subPhotoInput" accept="image/*" style="display:none;" onchange="previewSubPhoto(this)">
                <button class="small" onclick="document.getElementById('subPhotoInput').click()">📷 Фото</button>
                <input type="text" id="newSubcategoryName" placeholder="Название подкатегории" style="width:150px; padding:8px 12px;">
                <button class="success small" onclick="addSubcategory()">➕ Добавить</button>
                <button class="small" onclick="closeSubcategorySection()" style="background:#999;">✕ Закрыть</button>
            </div>
        </div>
        <div id="subPhotoPreview" class="photo-preview"></div>
        <div class="subcategory-grid" id="subcategoryGrid"></div>
    </div>

    <!-- ===== МОДАЛЬНОЕ ОКНО ПОДКАТЕГОРИИ (ТОВАРЫ) ===== -->
    <div class="modal-overlay" id="subModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">
                    <span class="icon" id="subModalIcon">📂</span>
                    <span id="subModalTitle">Подкатегория</span>
                    <span class="count" id="subModalCount" style="font-size:14px;font-weight:400;color:#999;"></span>
                </div>
                <button class="close-btn" onclick="closeSubModal()">✕</button>
            </div>
            <div id="subModalProducts"></div>
            <div class="add-product-row">
                <input type="text" id="subModalProductName" placeholder="Название товара">
                <input type="text" id="subModalProductSku" placeholder="Артикул" style="flex:0.7;">
                <input type="text" id="subModalProductSizes" placeholder="Размеры (S,M,L)" style="flex:0.7;">
                <input type="number" id="subModalProductQty" placeholder="Кол-во" value="1" style="flex:0.5; min-width:60px;">
                <button class="success small" onclick="addProductToSubcategory()">➕</button>
            </div>
        </div>
    </div>

    <div id="notificationContainer"></div>
    <div id="totalInfo" class="total-info">📊 Загрузка...</div>

    <script>
        // ==================================================
        // ✅ FIREBASE КОНФИГ
        // ==================================================
        const firebaseConfig = {
            apiKey: "AIzaSyC-a15NM1nzH8ELTqlBc6SDtQIIAQ2qu0g",
            authDomain: "sklad-app-898f7.firebaseapp.com",
            projectId: "sklad-app-898f7",
            storageBucket: "sklad-app-898f7.firebasestorage.app",
            messagingSenderId: "617217671865",
            appId: "1:617217671865:web:2a75647e9369d032bb1168"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();
        
        let categories = [];
        let subcategories = [];
        let products = [];
        let selectedCategoryId = null;
        let selectedSubcategoryId = null;
        let currentSubPhotoFile = null;
        let unsubCategories = null;
        let unsubSubcategories = null;
        let unsubProducts = null;
        let currentSubModalId = null;

        // ============================================
        // УВЕДОМЛЕНИЯ
        // ============================================
        function showNotification(message, type = 'info') {
            const container = document.getElementById('notificationContainer');
            const el = document.createElement('div');
            el.className = `notification ${type}`;
            el.textContent = message;
            container.appendChild(el);
            setTimeout(() => el.remove(), 2500);
        }

        function updateSyncStatus(text, status = 'waiting') {
            const el = document.getElementById('syncStatus');
            if (el) {
                el.textContent = text;
                el.className = `sync-status sync-${status}`;
            }
        }

        // ============================================
        // СЖАТИЕ ФОТО
        // ============================================
        function compressImage(file, maxWidth = 300, maxHeight = 300, quality = 0.7) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        let w = img.width, h = img.height;
                        if (w > h) { if (w > maxWidth) { h = h * (maxWidth / w); w = maxWidth; } }
                        else { if (h > maxHeight) { w = w * (maxHeight / h); h = maxHeight; } }
                        const canvas = document.createElement('canvas');
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = 'high';
                        ctx.drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.src = e.target.result;
                };
            });
        }

        function previewSubPhoto(input) {
            const file = input.files[0];
            if (file) {
                currentSubPhotoFile = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('subPhotoPreview').innerHTML = `<img src="${e.target.result}">`;
                };
                reader.readAsDataURL(file);
            }
        }

        // ============================================
        // КАТЕГОРИИ
        // ============================================
        function listenCategories() {
            if (unsubCategories) unsubCategories();
            unsubCategories = db.collection('categories')
                .onSnapshot((snapshot) => {
                    categories = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        categories.push({ id: doc.id, ...data });
                    });
                    categories.sort((a, b) => a.name.localeCompare(b.name));
                    renderCategories();
                });
        }

        function renderCategories() {
            const grid = document.getElementById('categoryGrid');
            if (categories.length === 0) {
                grid.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>Нет категорий. Создайте первую!</p></div>';
                return;
            }
            let html = '';
            categories.forEach(cat => {
                const subCount = subcategories.filter(s => s.categoryId === cat.id).length;
                const active = selectedCategoryId === cat.id ? 'active' : '';
                html += `
                    <div class="category-card ${active}" onclick="selectCategory('${cat.id}')">
                        <button class="cat-delete" onclick="event.stopPropagation(); deleteCategory('${cat.id}')">✕</button>
                        <div class="cat-emoji">${cat.emoji || '📁'}</div>
                        <div class="cat-name">${escapeHtml(cat.name)}</div>
                        <div class="cat-count">${subCount} подкатегорий</div>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }

        async function addCategory() {
            const nameInput = document.getElementById('newCategoryName');
            const emojiInput = document.getElementById('newCategoryEmoji');
            const name = nameInput.value.trim();
            const emoji = emojiInput.value.trim() || '📁';
            if (!name) { showNotification('Введите название категории', 'error'); return; }
            try {
                await db.collection('categories').add({
                    name: name,
                    emoji: emoji,
                    createdAt: new Date().toISOString()
                });
                nameInput.value = '';
                showNotification(`✅ Категория "${name}" создана`, 'success');
            } catch (e) { showNotification('Ошибка создания', 'error'); console.error(e); }
        }

        async function deleteCategory(categoryId) {
            const cat = categories.find(c => c.id === categoryId);
            if (!cat) return;
            if (!confirm(`Удалить категорию "${cat.name}" со всеми подкатегориями и товарами?`)) return;
            try {
                const subs = subcategories.filter(s => s.categoryId === categoryId);
                for (let sub of subs) {
                    const prods = products.filter(p => p.subcategoryId === sub.id);
                    for (let p of prods) await db.collection('products').doc(p.id).delete();
                    await db.collection('subcategories').doc(sub.id).delete();
                }
                await db.collection('categories').doc(categoryId).delete();
                if (selectedCategoryId === categoryId) { selectedCategoryId = null; document.getElementById('subcategorySection').style.display = 'none'; }
                showNotification(`✅ Категория удалена`, 'success');
            } catch (e) { showNotification('Ошибка удаления', 'error'); console.error(e); }
        }

        function selectCategory(categoryId) {
            selectedCategoryId = categoryId;
            renderCategories();
            const cat = categories.find(c => c.id === categoryId);
            if (cat) {
                document.getElementById('selectedCategoryName').textContent = `${cat.emoji || '📁'} ${cat.name}`;
                document.getElementById('subcategorySection').style.display = 'block';
                document.getElementById('subPhotoPreview').innerHTML = '';
                currentSubPhotoFile = null;
                document.getElementById('subPhotoInput').value = '';
                listenSubcategories(categoryId);
            }
        }

        function closeSubcategorySection() {
            selectedCategoryId = null;
            document.getElementById('subcategorySection').style.display = 'none';
            if (unsubSubcategories) { unsubSubcategories(); unsubSubcategories = null; }
            renderCategories();
        }

        // ============================================
        // ПОДКАТЕГОРИИ
        // ============================================
        function listenSubcategories(categoryId) {
            if (unsubSubcategories) unsubSubcategories();
            unsubSubcategories = db.collection('subcategories')
                .where('categoryId', '==', categoryId)
                .onSnapshot((snapshot) => {
                    subcategories = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        subcategories.push({ id: doc.id, ...data });
                    });
                    subcategories.sort((a, b) => a.name.localeCompare(b.name));
                    renderSubcategories();
                });
        }

        function renderSubcategories() {
            const grid = document.getElementById('subcategoryGrid');
            if (subcategories.length === 0) {
                grid.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>Нет подкатегорий. Добавьте первую!</p></div>';
                return;
            }
            let html = '';
            subcategories.forEach(sub => {
                const prodCount = products.filter(p => p.subcategoryId === sub.id).length;
                const photoHtml = sub.photo 
                    ? `<img src="${sub.photo}" alt="">` 
                    : '📂';
                html += `
                    <div class="subcategory-card" onclick="openSubcategoryModal('${sub.id}')">
                        <div class="sub-photo">${photoHtml}</div>
                        <div class="sub-name">${escapeHtml(sub.name)}</div>
                        <div class="sub-count">${prodCount} товаров</div>
                        <div class="sub-actions">
                            <button class="sub-delete" onclick="event.stopPropagation(); deleteSubcategory('${sub.id}')">✕ Удалить</button>
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }

        async function addSubcategory() {
            if (!selectedCategoryId) { showNotification('Сначала выберите категорию', 'error'); return; }
            const nameInput = document.getElementById('newSubcategoryName');
            const name = nameInput.value.trim();
            if (!name) { showNotification('Введите название подкатегории', 'error'); return; }
            try {
                let photoData = null;
                if (currentSubPhotoFile) {
                    photoData = await compressImage(currentSubPhotoFile, 300, 300, 0.7);
                }
                await db.collection('subcategories').add({
                    name: name,
                    categoryId: selectedCategoryId,
                    photo: photoData,
                    createdAt: new Date().toISOString()
                });
                nameInput.value = '';
                document.getElementById('subPhotoPreview').innerHTML = '';
                currentSubPhotoFile = null;
                document.getElementById('subPhotoInput').value = '';
                showNotification(`✅ Подкатегория "${name}" создана`, 'success');
            } catch (e) { showNotification('Ошибка создания', 'error'); console.error(e); }
        }

        async function deleteSubcategory(subcategoryId) {
            const sub = subcategories.find(s => s.id === subcategoryId);
            if (!sub) return;
            const prodCount = products.filter(p => p.subcategoryId === subcategoryId).length;
            let msg = `Удалить подкатегорию "${sub.name}"?`;
            if (prodCount > 0) msg += `\n\n⚠️ В ней ${prodCount} товаров. Они тоже будут удалены!`;
            if (!confirm(msg)) return;
            try {
                const prods = products.filter(p => p.subcategoryId === subcategoryId);
                for (let p of prods) await db.collection('products').doc(p.id).delete();
                await db.collection('subcategories').doc(subcategoryId).delete();
                showNotification(`✅ Подкатегория удалена`, 'success');
            } catch (e) { showNotification('Ошибка удаления', 'error'); console.error(e); }
        }

        // ============================================
        // ТОВАРЫ
        // ============================================
        function listenProducts() {
            if (unsubProducts) unsubProducts();
            unsubProducts = db.collection('products')
                .onSnapshot((snapshot) => {
                    products = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        products.push({ id: doc.id, ...data });
                    });
                    products.sort((a, b) => a.createdAt > b.createdAt ? -1 : 1);
                    renderSubcategories();
                    updateTotal();
                });
        }

        // ============================================
        // МОДАЛЬНОЕ ОКНО ПОДКАТЕГОРИИ
        // ============================================
        function openSubcategoryModal(subcategoryId) {
            currentSubModalId = subcategoryId;
            const sub = subcategories.find(s => s.id === subcategoryId);
            if (!sub) return;
            
            const cat = categories.find(c => c.id === sub.categoryId);
            const catEmoji = cat ? cat.emoji : '📂';
            
            document.getElementById('subModalIcon').textContent = catEmoji;
            document.getElementById('subModalTitle').textContent = sub.name;
            
            const modal = document.getElementById('subModal');
            const list = document.getElementById('subModalProducts');
            const countEl = document.getElementById('subModalCount');
            
            const subProducts = products.filter(p => p.subcategoryId === subcategoryId);
            countEl.textContent = `(${subProducts.length} шт.)`;
            
            if (subProducts.length === 0) {
                list.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>Нет товаров в этой подкатегории</p></div>`;
            } else {
                let html = '';
                subProducts.forEach(p => {
                    const isLow = p.quantity <= (p.minStock || 5);
                    const photoHtml = p.photo ? `<img src="${p.photo}">` : '📷';
                    html += `
                        <div class="product-item">
                            <div class="p-photo">${photoHtml}</div>
                            <div class="p-info">
                                <div class="p-name">${escapeHtml(p.name)}</div>
                                ${p.sku ? `<div class="p-details">🔢 ${escapeHtml(p.sku)}</div>` : ''}
                                ${p.sizes ? `<div class="p-details">📏 ${escapeHtml(p.sizes)}</div>` : ''}
                                <div class="p-details">Мин. остаток: ${p.minStock || 5} шт.</div>
                            </div>
                            <div class="p-qty ${isLow ? 'low' : ''}">${p.quantity}</div>
                            <div class="p-controls">
                                <button class="minus" onclick="changeProductQty('${p.id}', -1)">−</button>
                                <button class="plus" onclick="changeProductQty('${p.id}', 1)">+</button>
                            </div>
                            <button class="p-delete" onclick="deleteProduct('${p.id}')">✕</button>
                        </div>
                    `;
                });
                list.innerHTML = html;
            }
            
            modal.classList.add('show');
            document.body.style.overflow = 'hidden';
            document.getElementById('subModalProductName').value = '';
            document.getElementById('subModalProductSku').value = '';
            document.getElementById('subModalProductSizes').value = '';
            document.getElementById('subModalProductQty').value = '1';
        }

        function closeSubModal() {
            document.getElementById('subModal').classList.remove('show');
            document.body.style.overflow = 'auto';
        }

        // ============================================
        // ДОБАВЛЕНИЕ ТОВАРА В ПОДКАТЕГОРИЮ
        // ============================================
        async function addProductToSubcategory() {
            if (!currentSubModalId) { showNotification('Ошибка: подкатегория не выбрана', 'error'); return; }
            const name = document.getElementById('subModalProductName').value.trim();
            const sku = document.getElementById('subModalProductSku').value.trim();
            const sizes = document.getElementById('subModalProductSizes').value.trim();
            const qty = parseInt(document.getElementById('subModalProductQty').value) || 0;
            const minStock = 5;
            
            if (!name) { showNotification('Введите название товара', 'error'); return; }
            
            try {
                await db.collection('products').add({
                    name: name,
                    sku: sku,
                    sizes: sizes,
                    quantity: qty,
                    subcategoryId: currentSubModalId,
                    minStock: minStock,
                    photo: null,
                    createdAt: new Date().toISOString()
                });
                showNotification(`✅ Товар "${name}" добавлен`, 'success');
                document.getElementById('subModalProductName').value = '';
                document.getElementById('subModalProductSku').value = '';
                document.getElementById('subModalProductSizes').value = '';
                document.getElementById('subModalProductQty').value = '1';
                // Обновляем модалку
                openSubcategoryModal(currentSubModalId);
            } catch (e) { showNotification('Ошибка добавления', 'error'); console.error(e); }
        }

        // ============================================
        // ИЗМЕНЕНИЕ КОЛИЧЕСТВА ТОВАРА
        // ============================================
        async function changeProductQty(productId, delta) {
            const p = products.find(p => p.id === productId);
            if (!p) return;
            const newQty = Math.max(0, p.quantity + delta);
            try {
                await db.collection('products').doc(productId).update({ quantity: newQty });
                if (newQty <= (p.minStock || 5)) {
                    showNotification(`⚠️ ${p.name}: осталось ${newQty} шт.`, 'error');
                }
                // Обновляем модалку
                if (currentSubModalId) openSubcategoryModal(currentSubModalId);
            } catch (e) { console.error(e); }
        }

        // ============================================
        // УДАЛЕНИЕ ТОВАРА
        // ============================================
        async function deleteProduct(productId) {
            const p = products.find(p => p.id === productId);
            if (!p) return;
            if (!confirm(`Удалить товар "${p.name}"?`)) return;
            try {
                await db.collection('products').doc(productId).delete();
                showNotification(`✅ "${p.name}" удалён`, 'success');
                if (currentSubModalId) openSubcategoryModal(currentSubModalId);
            } catch (e) { showNotification('Ошибка удаления', 'error'); console.error(e); }
        }

        // ============================================
        // ОБНОВЛЕНИЕ СТАТИСТИКИ
        // ============================================
        function updateTotal() {
            const total = products.length;
            const totalQty = products.reduce((sum, p) => sum + p.quantity, 0);
            document.getElementById('totalInfo').textContent = `📊 Всего: ${total} товаров | На складе: ${totalQty} шт.`;
            // Обновляем количество в подкатегориях при открытой секции
            if (selectedCategoryId) renderSubcategories();
        }

        // ============================================
        // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        // ============================================
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
        }

        // Закрытие модалки по клику на оверлей и ESC
        document.addEventListener('click', (e) => {
            const modal = document.getElementById('subModal');
            if (e.target === modal) closeSubModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeSubModal();
        });

        // ============================================
        // ЗАПУСК
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            listenCategories();
            listenProducts();
            updateSyncStatus('✅ Готово', 'online');
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Общий склад - Google Sheets</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #ffffff;
            color: #000000;
            padding: 16px;
            padding-bottom: 100px;
        }
        @media (prefers-color-scheme: dark) {
            body { background: #1a1a1a; color: #ffffff; }
            .add-form, .product-card, .search-section, .category-filter { background: #2d2d2d !important; }
            input, select { background: #1a1a1a; color: #ffffff; border-color: #444; }
            .total-info { background: #2d2d2d; border-top-color: #444; }
            .product-name { color: #ffffff !important; }
            .product-category { color: #aaaaaa !important; }
        }
        .header { margin-bottom: 20px; text-align: center; }
        h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .add-form, .search-section, .category-filter {
            background: #f0f0f0;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 16px;
        }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 14px; margin-bottom: 6px; color: #666; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 12px;
            background: white;
            color: black;
            font-size: 16px;
        }
        button {
            background: #2481cc;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
        }
        button:active { opacity: 0.7; }
        .photo-preview { margin-top: 10px; text-align: center; }
        .photo-preview img { max-width: 100px; max-height: 100px; border-radius: 12px; }
        .product-card {
            background: #f9f9f9;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            animation: fadeIn 0.15s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .product-card.low-stock { border-left: 4px solid #ff5c5c; background: rgba(255, 92, 92, 0.1); }
        .product-header { display: flex; gap: 12px; margin-bottom: 12px; }
        .product-photo { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; background: #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .product-info { flex: 1; }
        .product-name { font-weight: 600; font-size: 18px; margin-bottom: 4px; color: #000000 !important; }
        .product-category { font-size: 12px; color: #555555 !important; margin-bottom: 4px; }
        .product-quantity { font-size: 20px; font-weight: bold; color: #2481cc; }
        .quantity-control { display: flex; align-items: center; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .quantity-control input { width: 80px; text-align: center; padding: 8px; }
        .action-btn { width: 40px; height: 40px; border-radius: 20px; font-size: 20px; font-weight: bold; border: none; cursor: pointer; }
        .action-btn.minus { background: rgba(255, 92, 92, 0.2); color: #ff5c5c; }
        .action-btn.plus { background: rgba(0, 184, 148, 0.2); color: #00b894; }
        .delete-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: #999; margin-left: auto; }
        .search-box { display: flex; gap: 8px; align-items: center; }
        .search-box input { flex: 1; }
        .category-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .chip { padding: 6px 12px; border-radius: 20px; background: white; color: black; font-size: 13px; cursor: pointer; border: 1px solid #ccc; }
        .chip.active { background: #2481cc; color: white; border-color: #2481cc; }
        .notification { position: fixed; bottom: 100px; left: 16px; right: 16px; background: #ff5c5c; color: white; padding: 12px; border-radius: 12px; text-align: center; z-index: 200; animation: fadeIn 0.2s; }
        .total-info { position: fixed; bottom: 0; left: 0; right: 0; background: #f0f0f0; padding: 12px 16px; border-top: 1px solid #ddd; text-align: center; font-weight: 500; z-index: 100; font-size: 13px; }
        .empty-state { text-align: center; padding: 40px; color: #999; }
        .sync-status {
            font-size: 12px;
            text-align: center;
            margin-top: 5px;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
        }
        .sync-online { background: rgba(0, 184, 148, 0.15); color: #00b894; }
        .sync-offline { background: rgba(255, 92, 92, 0.15); color: #ff5c5c; }
        .sync-waiting { background: rgba(36, 129, 204, 0.15); color: #2481cc; }
        .button-group { display: flex; gap: 8px; justify-content: center; margin-top: 8px; }
        .refresh-btn { padding: 8px 16px; font-size: 14px; width: auto; background: #2481cc; color: white; border: none; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h1>👖🩳 Общий склад</h1>
        <div style="text-align: center;">
            <div class="sync-status sync-waiting" id="syncStatus">
                🔄 Подключение к Google...
            </div>
        </div>
        <div class="button-group">
            <button class="refresh-btn" id="refreshBtn">🔄 Синхронизировать</button>
        </div>
    </div>

    <div class="add-form">
        <div class="input-group">
            <label>📷 Фото товара</label>
            <input type="file" id="productPhoto" accept="image/*">
            <div class="photo-preview" id="photoPreview"></div>
        </div>
        <div class="input-group">
            <label>📝 Название товара</label>
            <input type="text" id="productName" placeholder="Например: Джинсы slim, Шорты пляжные">
        </div>
        <div class="input-group">
            <label>📁 Категория</label>
            <select id="productCategory">
                <option value="Джинсы">👖 Джинсы</option>
                <option value="Шорты">🩳 Шорты</option>
            </select>
        </div>
        <div class="input-group">
            <label>🔢 Количество</label>
            <input type="number" id="productQuantity" value="1" min="0">
        </div>
        <div class="input-group">
            <label>⚠️ Минимальный остаток</label>
            <input type="number" id="productMinStock" value="5" min="0">
        </div>
        <button id="addBtn">➕ Добавить товар</button>
    </div>

    <div class="search-section">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Поиск товаров...">
        </div>
    </div>

    <div class="category-filter">
        <label>📂 Фильтр по категории</label>
        <div class="category-chips" id="categoryChips">
            <span class="chip active" data-cat="all">📋 Все</span>
            <span class="chip" data-cat="Джинсы">👖 Джинсы</span>
            <span class="chip" data-cat="Шорты">🩳 Шорты</span>
        </div>
    </div>

    <div id="productsList"></div>
    <div id="totalInfo" class="total-info"></div>
    <div id="notificationContainer"></div>

    <script>
        // ============================================
        // ✅ НОВЫЙ URL ВСТАВЛЕН ✅
        // ============================================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyx8zAUTXX_7pKkuB05Lr1ik_KRsqj1R4uvCP9aXXvrVY0xh92HasffjOPkYG-M6JZ9/exec';
        
        let products = [];
        let currentFilter = 'all';
        let searchQuery = '';
        let isLoading = false;

        function updateSyncStatus(text, status = 'waiting') {
            const el = document.getElementById('syncStatus');
            if (!el) return;
            el.textContent = text;
            el.className = `sync-status sync-${status}`;
        }

        function showNotification(message, isWarning = true) {
            const container = document.getElementById('notificationContainer');
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.style.background = isWarning ? '#ff5c5c' : '#00b894';
            notif.innerHTML = message;
            container.appendChild(notif);
            setTimeout(() => notif.remove(), 2500);
        }

        // ============================================
        // ЗАГРУЗКА ИЗ GOOGLE SHEETS
        // ============================================
        async function loadFromGoogle() {
            if (isLoading) return;
            isLoading = true;
            updateSyncStatus('🔄 Загрузка из Google...', 'waiting');
            
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                if (data && data.length > 0) {
                    products = data.map(item => ({
                        id: item.id,
                        name: item.name,
                        quantity: item.quantity || 0,
                        category: item.category || 'Джинсы',
                        minStock: item.minStock || 5,
                        photo: item.photo || null,
                        created_at: item.created_at || new Date().toISOString()
                    }));
                    updateSyncStatus(`✅ ${products.length} товаров из Google`, 'online');
                } else {
                    products = [];
                    updateSyncStatus('📭 Таблица пуста. Добавьте первый товар!', 'online');
                }
                renderProducts();
                saveToCache();
                
            } catch (error) {
                console.error('Ошибка:', error);
                updateSyncStatus('⚠️ Ошибка загрузки', 'offline');
                loadFromCache();
            }
            isLoading = false;
        }

        // ============================================
        // СОХРАНЕНИЕ В GOOGLE SHEETS
        // ============================================
        async function saveToGoogle(product) {
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(product)
                });
                
                if (!response.ok) throw new Error('Ошибка');
                
                const data = await response.json();
                if (data && data[0]) {
                    product.id = data[0].id;
                    showNotification(`✅ Сохранено в Google: ${product.name}`, false);
                    return true;
                }
                return false;
                
            } catch (error) {
                console.error('Ошибка сохранения:', error);
                showNotification(`⚠️ Не удалось сохранить "${product.name}"`, true);
                return false;
            }
        }

        // ============================================
        // ОБНОВЛЕНИЕ В GOOGLE SHEETS
        // ============================================
        async function updateInGoogle(id, updates) {
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id, updates: updates })
                });
                return response.ok;
            } catch (error) {
                console.error('Ошибка обновления:', error);
                return false;
            }
        }

        // ============================================
        // УДАЛЕНИЕ ИЗ GOOGLE SHEETS
        // ============================================
        async function deleteFromGoogle(id) {
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id })
                });
                return response.ok;
            } catch (error) {
                console.error('Ошибка удаления:', error);
                return false;
            }
        }

        // ============================================
        // КЭШ
        // ============================================
        function saveToCache() {
            localStorage.setItem('google_warehouse', JSON.stringify(products));
        }

        function loadFromCache() {
            const saved = localStorage.getItem('google_warehouse');
            if (saved) {
                try {
                    products = JSON.parse(saved);
                    renderProducts();
                    updateSyncStatus(`📱 ${products.length} товаров (кэш)`, 'offline');
                } catch(e) {}
            }
        }

        // ============================================
        // ДОБАВЛЕНИЕ ТОВАРА
        // ============================================
        async function addProduct() {
            const nameInput = document.getElementById('productName');
            const quantityInput = document.getElementById('productQuantity');
            const categorySelect = document.getElementById('productCategory');
            const minStockInput = document.getElementById('productMinStock');
            const photoInput = document.getElementById('productPhoto');
            
            let name = nameInput.value.trim();
            let quantity = parseInt(quantityInput.value, 10);
            let category = categorySelect.value;
            let minStock = parseInt(minStockInput.value, 10);
            
            if (name === '') {
                alert('Введите название товара');
                return;
            }
            if (isNaN(quantity)) quantity = 0;
            if (isNaN(minStock)) minStock = 5;
            
            const processSave = async (photoData) => {
                const newProduct = {
                    name: name,
                    quantity: quantity,
                    category: category,
                    minStock: minStock,
                    photo: photoData,
                    created_at: new Date().toISOString()
                };
                
                showNotification(`📤 Сохранение "${name}"...`, false);
                
                const saved = await saveToGoogle(newProduct);
                
                if (saved && newProduct.id) {
                    products.unshift({
                        id: newProduct.id,
                        name: name,
                        quantity: quantity,
                        category: category,
                        minStock: minStock,
                        photo: photoData,
                        created_at: newProduct.created_at
                    });
                    renderProducts();
                    clearForm();
                    saveToCache();
                }
            };
            
            if (photoInput.files && photoInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) { processSave(e.target.result); };
                reader.readAsDataURL(photoInput.files[0]);
            } else {
                processSave(null);
            }
        }

        function clearForm() {
            document.getElementById('productName').value = '';
            document.getElementById('productQuantity').value = '1';
            document.getElementById('productMinStock').value = '5';
            document.getElementById('productPhoto').value = '';
            document.getElementById('photoPreview').innerHTML = '';
        }

        async function deleteProduct(id) {
            const product = products.find(p => p.id === id);
            if (product && confirm(`Удалить "${product.name}" из общего склада?`)) {
                showNotification(`📤 Удаление "${product.name}"...`, false);
                
                const deleted = await deleteFromGoogle(id);
                if (deleted) {
                    products = products.filter(p => p.id !== id);
                    renderProducts();
                    saveToCache();
                    showNotification(`✅ Удалён: ${product.name}`, false);
                } else {
                    showNotification(`❌ Не удалось удалить`, true);
                }
            }
        }

        async function changeQuantity(id, delta) {
            const product = products.find(p => p.id === id);
            if (product) {
                let newQuantity = product.quantity + delta;
                if (newQuantity < 0) newQuantity = 0;
                product.quantity = newQuantity;
                renderProducts();
                await updateInGoogle(id, { quantity: newQuantity });
                checkLowStock(product);
            }
        }

        async function setQuantity(id, newValue) {
            const product = products.find(p => p.id === id);
            if (product) {
                let quantity = parseInt(newValue, 10);
                if (isNaN(quantity)) quantity = 0;
                product.quantity = quantity;
                renderProducts();
                await updateInGoogle(id, { quantity: quantity });
                checkLowStock(product);
            }
        }

        function checkLowStock(product) {
            if (product.quantity <= product.minStock) {
                showNotification(`⚠️ ${product.name}: осталось ${product.quantity} шт.`, true);
            }
        }

        function getFilteredProducts() {
            return products.filter(product => {
                if (currentFilter !== 'all' && product.category !== currentFilter) return false;
                if (searchQuery && !product.name.toLowerCase().includes(searchQuery.toLowerCase())) return false;
                return true;
            });
        }

        function renderProducts() {
            const container = document.getElementById('productsList');
            const totalSpan = document.getElementById('totalInfo');
            const filtered = getFilteredProducts();
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state">✨ Товары не найдены ✨</div>';
                totalSpan.innerHTML = `📊 Всего товаров: ${products.length}`;
                return;
            }
            
            let totalQuantity = 0;
            let html = '';
            
            for (let product of filtered) {
                totalQuantity += product.quantity;
                const isLow = product.quantity <= product.minStock;
                const categoryEmoji = product.category === 'Джинсы' ? '👖' : '🩳';
                
                html += `
                    <div class="product-card ${isLow ? 'low-stock' : ''}">
                        <div class="product-header">
                            ${product.photo ? `<img class="product-photo" src="${product.photo}" alt="фото">` : '<div class="product-photo">📷</div>'}
                            <div class="product-info">
                                <div class="product-name">${escapeHtml(product.name)}</div>
                                <div class="product-category">${categoryEmoji} ${product.category}</div>
                                <div class="product-quantity">${product.quantity} шт.</div>
                            </div>
                            <button class="delete-btn" onclick="deleteProduct(${product.id})">🗑️</button>
                        </div>
                        <div class="quantity-control">
                            <button class="action-btn minus" onclick="changeQuantity(${product.id}, -1)">−</button>
                            <input type="number" value="${product.quantity}" onchange="setQuantity(${product.id}, this.value)" min="0">
                            <button class="action-btn plus" onclick="changeQuantity(${product.id}, 1)">+</button>
                            ${isLow ? '<span style="color:#ff5c5c;">⚠️ Мало!</span>' : ''}
                        </div>
                        <div style="font-size:11px; color:#999;">Мин. остаток: ${product.minStock} шт.</div>
                    </div>
                `;
            }
            
            container.innerHTML = html;
            totalSpan.innerHTML = `📊 Всего: ${products.length} | На складе: ${totalQuantity} шт. | Показано: ${filtered.length}`;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function setupPhotoPreview() {
            const photoInput = document.getElementById('productPhoto');
            const preview = document.getElementById('photoPreview');
            if (photoInput) {
                photoInput.addEventListener('change', function() {
                    if (this.files && this.files[0]) {
                        const reader = new FileReader();
                        reader.onload = function(ev) {
                            preview.innerHTML = `<img src="${ev.target.result}" alt="предпросмотр">`;
                        };
                        reader.readAsDataURL(this.files[0]);
                    } else {
                        preview.innerHTML = '';
                    }
                });
            }
        }

        function setupCategoryFilter() {
            const chips = document.querySelectorAll('.chip');
            chips.forEach(chip => {
                chip.addEventListener('click', () => {
                    chips.forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    currentFilter = chip.getAttribute('data-cat');
                    renderProducts();
                });
            });
        }

        // ============================================
        // ЗАПУСК
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            setupPhotoPreview();
            setupCategoryFilter();
            loadFromGoogle();
            
            document.getElementById('addBtn').addEventListener('click', addProduct);
            document.getElementById('refreshBtn').addEventListener('click', loadFromGoogle);
            document.getElementById('searchInput').addEventListener('input', (e) => {
                searchQuery = e.target.value;
                renderProducts();
            });
            document.getElementById('productName').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addProduct();
            });
        });
    </script>
</body>
</html>
